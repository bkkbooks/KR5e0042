body:
  text: 雲山集序凡一庚戌夏五月友人論伯瑜至自相臺話舊之餘忽出知常先生文集一編將以板行垂世且索序引義不得以荒鄙辭披玩數四而弗能巳至於賦評論記銘敘歌詩或感物而造端或因人以示意大率以演暢真風蠲滌塵纍為主意其宏才慱識非夙學頴悟孰能與於此哉先生世本澤郡名族幼讀書習儒業業成涉大變因歸玄教盡棄世緣徑遂神遊八表之志何其偉歟借使當年值承平攄素業展盡底蘊而兼善天下其積功種德為如何哉唯其時與事於是退而作獨善之計以修身養性日飮聖腴與古仙上靈為之侶時有著述以鳴道妙而啓迪後人此兩者蓋知常與時舒卷之勢然也初何容心哉七月一日緑野雲孫長安裴憲子法引道行乎教非文不宣蓋將以詔衆而傳遠也宋末金初有所謂全真家者以心傳心不立文字然重陽祖師以降急於化人皆有教言以惠後學近世栖雲大老化導緣深語緑一編高出前革一傳而得吾知常子心地坦明問學該贍六十四卦八十一章咸有解釋而又作南華解義沖虛斷章言簡而意足義深而理明其可謂黃𠜍中之錚錚鉸鉸者爾間於應物之際遊戲𨌺墨其賦詩歌論碑記雜文娓娓可觀號雲山集長安裴憲子法巳敘之於前其友李君提舉復求余説綴於後余與知常有平昔之好嘗為作易解後序今何辭焉歲旃蒙赤奮若慎獨老人東明王鶚百一序
