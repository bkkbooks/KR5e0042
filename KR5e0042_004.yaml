front:
  text: 雲山集卷之四兄四
  hash: sha256:1cb875c8503a9061f39225be8521475b6e7d4fb4b4d96460677d35419b3a2b9f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0042_HFL_004-001a, image: hfl/0783/0783-156.png}
body:
  text: 知常真人姬志真撰釣空蘆葦瀟瀟幾度秋可憐人老未歸休細鱗不食雲霞餌空向晴波浸月鈎真樂無樂無知有活機不妨人侮太愚癡誰知無樂無知者一點間愁許上眉友山杖藜宜訪知心友茅屋須鄰得意山益友好山相對面不妨終日笑談間養性奪得玄珠唯罔象正宜恬智交相養年深放出大光明照破乾坤無盡藏夜月窗户風清月滿懷灑然飛步到蓬萊世人不得愁城破殃及壺中麴秀才駘蕩赭沫天倪勢不拘縱橫寰海任馳驅太平無象人難遇赤水空沉罔象珠玉簪閭苑飛瓊舞翠霞遺簪墮地長成花聯芳不斷傳青白付與雲山道士家有詩萬塵削落氣神安默轉當空活眼環不意有詩來觸撥五雲歸路不相干春盤山四詠山色密傳真造化水聲敷演道因緣良心用處縱橫是何必猖狂肉案前夏亭下風清衣袂寒山前行客汗垂顔仙凡不遠雲泥隔名利催人不放間秋暑去山中渾不知怪來黃菊競芳菲西風一日傳嚴令錯落半天紅葉飛冬霜雪摧殘錦繡空四圍山色舊形容夜深特室燃香坐一色風鳴萬壑松滯坐句裏搜尋向上機迷家稚子轉忘歸不知突破窗間紙放出癡蠅自在飛遁身海童戲水鷗先覺痀瘻持竿蟬不知深眇藏身無所住季咸相見恰如癡動靜贈許紹明二首其一動必隨他靜必癡兩忘中有活關機直交無舌人能語始信名言果是非其二中原狼虎怒垂涎幸有桃源隱洞天流水落花依舊在請君乘取斷頭船同前羣仙高會話方壺笑指蓬萊水漸枯莫更飯牛歌白石好尋罔象索玄珠釣歸枯湫死水無魚釣輕餌篠竿盡日間不似會稽任老子小舟和月夜深還同前弱喪家園已不知忘羊路上轉增迷早回收拾雲霞餌一棹清風明月溪性月浩浩靈風縱掃除性天揮斥片雲無乾坤一色如銀界放出光明不夜珠警世倏忽光陰一擲梭須臾衰老鬢雙皤閻家不測來追唤手足慞惶奈若何心機心機用盡幹家門白髮垂垂眼又昏未後不知何處落臨行猶囑付兒孫百歲百歲光陰頃刻間貪婪終日用機關一針一草皆前定剛使身心不暫間閻老閻老無情孰不諳目前光景且貪婪莫防一日來頭上沒可支吾何太𤺍林泉草木叢林總是玄泠泠寒玉潄流泉坐忘遺照人誰解露滴松梢月正圓間人風林月障照山花嵓石溪流共一家唯有間人堪作主無情無我伴煙霞修真修真真處亦何修咄盡諸緣萬事休成就本然功德性步隨明月上瀛洲神仙神仙莫向外邊尋止是元初一片心灑落萬塵籠不住立教大地變黃金延年自有延年不死方好傾丹悃問醫王凡心刳盡投神藥蟬蛻分明脫苦囊誦經布網張羅積業多晚年信口念摩訶執迷妄想來生福閻老如何談得過夢蝶為周為蝶兩形分未見誰為作夢人栩栩蘧蘧消息得寥天大地盡吾身夔蚿天真用處盡通靈穿貫無形及有形妙用驅馳隨處是月明江靜酒初醒濠梁亘初無樂亦無知知樂才生第二機循本却尋知處起游魚彼我自同歸解牛塵事堆山積嶽來解如無解刃恢恢交加未肯剛批判密護神鋒不浪開牧馬聖智滑稽迷大隗野童病瞀却師天纖塵害性須除削露出元初妙不傳養雞元初悟徹便休心自是無心功更深坐處木雕泥捏似世間何物敢相侵承蜩丈人猶自未忘機蜩翼藏身蜩不知更到鬼神不測處拈來信手更何疑狎鷗己之靈是物之靈己若無心物自寧空界偶然通一線海鷗不敢下沙汀養虎人心猛過山中虎敢放斯須喜怒生安置本然清靜地兩忘物我自和平節猿勞神為一不知同有識俱為造化籠數定倒顛無損益妄生憂喜怨狙公蠻觸妙玄靈跡浩無涯大地全形共一蝸塵世小木鴈於頭上角可憐纖悉謾爭差不材山木自全真野鴈無能却喪身道用日新窮變化或離或即妙通神釣鯨大器洪才未易求揭竿滄海餌懸牛乃公豈是撈蝦手蹲坐三年不上鈎拂子不萌枝上剩龜毛在手蛟虻見影逃堅起示人成按款坐看平地起風濤梭扇便面龜毛兼作拂犀牛不寫嫌粗俗靈風隨手淡相宜秋月遙山清可掬自解世事紛紛大足云一瓢一衲舊隨身任行任坐無拘束自在東西南北人道經或云道家無經止五千言而已故作詩以咄之端拱主人無語句臺輿僕隸鬧喧闐希聲絶相忘言處海水墨山書不全種蓮鑿破蒼苔種玉蓮圓明一點上通天俯觀坐彌羅外日月星辰直下旋三宜淡靜虛空著此身宜愚宜拙更宜貧出塵安穩真消息不可尋常說與人幻化萬事於人戲沐猴化工不息販何樓癡童博得間拈弄瓦狗泥車打破休化機化機於物太無情不許須臾眼轉睛拈起頭來還是尾片時作壞片時成貪生皮口朝朝索飯填肉身歲歲著衣纏用心到底成何濟送入荒郊土底眠浮生浮生都在百年中畢竟勞勞到底空爭奈這團腥臭物却交攖擾主人公間身蛛絲網几壁生塵老去叨慵不厭貧却有這籌難可得水雲鄉裏放間身詩魔詩魔潜迹懶看書拙訥忘情若太愚却坐太平間日月儘教人作馬牛呼同前詩魔今已堅降旗又著南華故紙癡打破這團迷種子白雲鄉裏笑嘻嘻蠹蟲四十年來學蠧蟲而今頓覺老叨慵誰知些子間難得惱殺厖眉舊主公多病多病苦耽清靜癖好書猶著聖賢魔無端之紀藏諸用奈此膏肓上下何機關些子機關苦不多緩行不至急行過從今放下都休問唱出升平一曲歌幻形幻形認有即拘墟跳出牢籠步坦途造物許饒先一著也勝猶執化人祛冝休白首須當急急修養身粗足便宜休心田潔靜常安穩隄備閻家老子勾黃籙幾排黃籙濟孤魂濟了孤魂依舊存自有祖宗歸不得忙忙千古為兒孫正眼有心絶筆塵猶在立意忘言意未忘有日豁然開正眼能言能筆又何妨虛堂虛堂坐卧無人問妙用機關只自知名勢結交如水淡老來方覺得便宜安居生涯粗足獲安居無事逍遙步坦途寄迹仙凡莫分别大家依樣畫葫蘆天鈞朝菌冥靈及大椿短長一例自天鈞而今七十人間少管甚前程幾度春神馬穩乘神馬駕尻輪南北東西逐日新拖去拽來從爾耳主人依舊沒疏親性珠一顆圓明自性珠本來無缺亦無餘家藏莫使緣塵羃放出神光耀太虛六言絶句贈作針衛會首揮霍機鋒快利疏通關竅渾圇恰似功夫成就古今不許常存同前向上機關透脫匠成真體圓融妙用縱橫表裏神鋒聯串虛空述懷風清雲翳飄忽地迥參寥晏如鴈字幾行飛去不妨書破玄虛孤月飂飂長風寂泊瀟瀟虛籟平寧萬里寥天空廓一輪孤月圓明夢幻青鬢朱顔易失黃雞白日相催夢幻境中識破水雲鄉裏歸來心安山峙巍巍不動川流混混常間但得心安若此何勞别扣玄關重玄常啓重玄關楗執迷自間雲泥肉眼中存翳膜瞌頭外覓摩尼時光展臂時光已失轉頭世事成空俗物幻形有盡迷津苦海無窮紅塵足迹紅塵滚滚心田白浪淘淘自向洪波汨沒何能紫府遊遨白虎白虎青蛟莫論丹罏鉛鼎休詳絳闕瓊林溟幸金壺碧酒馨香日月日月東西出沒乾坤升降渾淪真宰默存厚薄浮生分外貪嗔形數不苟不貪不愛無情無喜無憂此世此形此數宜愚宜拙宜休月輪亭亭月轉冰輪萬籟消沉莫聞人影不須零亂杳然徑徹無垠輪轉輪轉多生浩劫貪圖百計千方八識七情戲弄四生六道承當坐久月透簾籠虛白風生几簟清凉坐久凝然無際不知身世何鄉真僞色裏膠青混合水中鹹味顢頇真僞欲生分别舉頭不見長安靈明靜盡纖塵不立杳冥三界彌羅物我不知所在靈明透入無何行止時止時行莫逆滿坑滿谷同塵非物非凡非聖能神能鬼能人見在見在何堪住著未來不可思惟點檢目前自己起心已間雲泥家風松菊依稀三徑窗户明通六如太平事業無象淳正家風有餘天真聲利場中退步水雲鄉裏間身順命不湛人僞達生自樂天真業識清靜本然未悟貪忙業識無涯逐境心頑似鐵隨流性亂如麻趨新夜壑舟遷捨故日車輪轉趨新緣木求魚妄作刻舟記劍勞神知覺聞見覺知四病杳冥昏默多愚求者捕亡擊鼓執之待兔守株三教為道為儒為釋水月鏡中三影皆從此處傳來選甚黃冠圓頂五言絶句荆棘荆棘除難盡芝蘭樹不榮故園藜藿合松菊可憐生賞音炷冷香仍在燈青焰亦微斷紋絃再續今古賞音稀真妄妄滅真重遣心空性自圓百川俱凑海萬曜不離天智巧智巧渾如拙聰明却似癡可憐千古意不許等間知病眼病眼唯觀物塵心只慕緣政如蠶作繭來去目纏綿著相著相終難造求言未可知向人拈不出相對只揚眉燭焰燭弄風前焰漚翻水上波不尋安穩地生滅竟如何心昧莫向絰中覓何勞相上尋博通今古事昧却本來心回頭休探水底月莫認空中花兩足何常動回頭即是家今古交臂成今古抬頭革故新一團空幻事謾殺利名人塵冗塵冗何須録浮生未足誇好栽無影樹疏却有情枷生滅落絮因風起飛花逐水流古今無定迹生滅有時休塵心塵心忙似火世事冗如麻不省光陰促紛紛逐落花無盡藏涸絶是非海治平人我山衝開無盡藏跳出有情關愛欲浮雲蔽杲日凉風敗秋蘭愛欲未能遣心君爭得安媒翳媒翳可射雉利欲能攻心丹田有靈物不鋤荆棘生世事世事無程限家緣沒盡頭不尋休歇地辛苦幾時休清靜清靜本然真隨宜盡入神不煩吹暖律寒谷自回春衰鬢衰鬢星星白朱顔漸漸枯不期閻老唤著甚可支吾生死生死門中住輪回路上行此心來往慣爭肯問前程積塵積塵昏慘慘長夜黑漫漫未遽通三要何由正五官陰陽陰陽為大匠天地作陶鈞從化隨時改趨生逐日新大道大道理幽深迷人顛倒尋去身渾不遠惟是本來心跋七真圖像寫真繪像是敬是仰只斯面目余將安倣向上宗師本無二相月印千江圓明一樣先天不朽真容如舊得之孰見傳之孰受俱戴天而莫測其高俱履地而莫窮其厚不古不今非暫非久尋源循迹而趨步不停奔逸絶塵而瞪若乎後狂屈欲言而忘季咸自失而走離朱拭眥而不見端倪黃帝聽瑩而不分可否罔象索之於無倏忽鑿之於有品藻者困其心雌黃者辟其口望洋向若而嘆豈容夫默染於丹青之手雲山集卷之四
