front:
  text: 雲山集卷之八兄八
  hash: sha256:9777bccd8d275666d7ff1f03964638c94ac119d8932c80fde584b5dc18a885ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0042_HFL_008-001a, image: hfl/0784/0784-137.png}
body:
  text: 知常真人姬志真撰京兆普度碑己未冬十月西涼府太子下官八合宿有素願修建無上黃籙醮事即本府迎祥觀自春抵秋葺營殿堂對治壇墠不遠敦請棲雲真人作大濟度師主張法席越某日召集羽流布陳儀象發文預告三界明真上下神祇齋戒精思庇物蕆事望前三日肇行典禮恭祀列聖三百六十分位意者薦濟宗族遠亡近化泊率土無主孤魂兼有親乏祀之家投壇附薦自此及彼無戚無疏俱賴薰修普祈超度如是行道三日兩夜望後一日昧爽散壇乃畢盡誠竭力亦仁孝之用心也嘗試言之天地一氣物我同根方萬化之弛張布衆形而區别雜以五行之生尅均以四序之推遷其變日新化亦罔極此氣動用之常也而又一受其形執以為我有於是相與靡刃對待則有強弱廢興死而後已殊不知氣之所役時之所運數之所存理之所在一僨一起有始有終得失存亡天之所造孰能禦之為之者敗執之者失逆之者滅順之者昌角智者窮角力者負蓋人之不可勝天久矣方今皇朝應運奄有諸夏朔南漢北東海西涼異軌殊途咸歸一統天下無二道率土無兩心向之兵革屠裂備經之矣彼之宗祀覆絶俱見之矣以今較昔萬無一存以己方人身獲安吉枝葉滋謾有人爵之從納自天之祐以身之幸思天下之不幸以己之親念天下之無親合氣同根得無感慨是以允懷素願披露丹衷仗玄元救物之慈啓黃籙大齋之法仰衆真之普力冀三境之垂光照燭幽冥開通陰府收攝萬氣久沉之魄悉歸源混合百神無主之魂皆拔萃共乘和氣幽贊皇圖一混車書載橐弓矢多方順化四海歸仁亦臣子之至願也醮筵潔備法事嚴行刻石紀功庶傳不朽托實而直書其銘曰夫物藝藝各復其根往而不返無主之魂執守之魄不得其門依草附木莫知所存況在兵塵連年不息殄殲勦絶萬不存一驚魂失措轉徙沉溺隨化往來動經劫石今承醮主發上善心崇修黃籙拔擢幽沉普天率土往古來今無疏無戚俱賴威音虛魄以歸遊魂復本介見者潛豕立者泯何彼何此咸居範圍沖氣冥會承平庶幾黃籙大齋碑人生天地間如蘧廬逆旅之暫寄距以百年光景之速猶白駒之過隙忽然而已未有常而不化者也而人在數十年中或壽或夭形有定數各不自知朝夕如是求其出化機之表入太漠之鄉者幾人哉自是而下孰能勉之夫為子者乃父母之委蛻也生死之間將何以報是以生當愛敬死當哀戚禋祀不忘禮之常也載思其親向之在世為身為我及諸萬塵誘引七情六欲之所謾昧無時不妄無時不為過積丘山善無絲忽今也骨骸委地魂魄投空滅而不續則若存而不滅果安在哉其在此乎在彼乎墮冥府之考校乎遊天上之宫闕乎其出入於六道四生乎其復生於人世乎噫未可知也有居無事而推之者矣若有真宰所司以幽明之異趣昧然罔識冥冥悠悠而已可不大哀耶是以孝心不忘思親報本其恩罔極泣血傷心匪仗玄勳憑何薦拔固當竭誠致敬披露丹衷祈禱高真希垂開度幸冀靈魂超越苦趣不逢亦感通之理也兹辰某人奉薦亡父母於今月日化當薦享之辰謹修黃籙大齋供聖若干分位敦請某師掌行醮事及命玄壇清衆進表上章依科行道某日為始發牒至某日焚詞告畢既來兹會潔赴靈壇各罄丹誠同心薦拔乃孝子仁人之盡心也威儀既備法事嚴行報本之誠宜書諸石以示來者亦勸善之亹亹也其銘曰子之事親死如奉生以享一薦泣血投誠父母之靈泊乎冥冥思以報本盡天之經詣此琳宫玉清之境祈以涓潔氣濁悉屏羣真輻輳衆聖同盟雲霞軿集師德咸臻慈雲法雨如雷如霆火庭煉度炊纍超升南昌觀碑道無棄物物無非道通六合之內外貫萬有之洪纖莫不皆存是以天得之而清地得之而寧三景得之而明四序得之而運聖人得之所以垂世立教蓋稟無名之朴降為鎮化之師妙用滋彰神功昭著靈源一發正派橫流雖步驟之殊時亦汙隆而順世道無增損用有行藏開闢以來洪荒莫紀中古以來槩舉其人伏羲之時鬱華子神農之時大成子黃帝之時廣成子顓頊之時赤精子高辛之時録圖子堯有務成子舜有尹壽子禹有真行子湯有錫則子之人也之德也皆出經傳道代為帝師玄派洪瀾波及羣品具載玄藏間有銷聲拂迹嘉遁忘名者莫知紀極殷周之世老氏出焉挫鋭解紛隨機應化復之以虛極靜篤申之以治人事天二篇四輔之存諸子百家之學瓊林競秀蘭友爭芳霜心雪臆之倫被褐懷玉月帔星冠之侣負笈擔簦經籍圖籙之支分科律典章之蔓衍製玉醴瓊漿之飮服五金八石之丹或鍊形行氣或吐故納新辟惡祛邪行符治鬼此應世養形之急皆輔道之事非為道之道也其於歸根復命之理有所忽諸近代重陽天挺神授絶纍捐塵建立夫根幹泉源掃蕩乎波瀾枝葉輔之以清淨真實應之以柔順謙沖具天地之大全完古今之大體也道傳東海數子皆能鼓舞服膺聞風唱和天下化之泊乎皇朝聖祖御極之初兼崇道德長春真人應召之後大闡門庭室中之席不虛户外之屨常滿及嗣教清和真人作大宗師寵膺上命簪裳接迹宫觀相望雖遐荒遠裔深山大澤皆有其人兹歷亭之北里不及舍聚落之墅曰屯莊富里之觀曰南昌爰自葆光大師之所建也師姓朱氏名志明本土居人葆光則其道號云盛年穎悟捐俗而道師事抱陽子劉志甫即太古真人之高弟也大師親炙左右日改月化大蒙印可中年復經父母之邦周覽故居荒蕪四塞仍存基址而已大師率徒就荒開徑墾劈其地以畝計者頃之半及蒙州主張侯給文以主之於是救之築之經之營之鳩功締搆曾未浹辰大成其事太上有殿雲會有堂瞻真境之粹容副輿人之至願薦薌肅於穀旦篤香火於晨昏丕贊皇圖延洪寶命善沾遐邇波及生靈報本尊師酬恩育德其在兹乎甫成之始請名於宗師額之曰南昌功成之後師藏其狂言與其不可言者而往矣古今相繼而傳者皆不聞可見之迹也迹非其本也其本則恬淡寂寞虛無無為乃天地之平道德之正存乎吾宗而已非見聞之可接也所以紛華泯絶枯朽回春人非幻化之人物非幻境之物此聖人之所以教人而有師資之道焉宫觀之作取象以明有孚顒若之禮所以為國薰修厥有旨哉知觀劉某不遠而來祈余紀實將追述前人之功業冀未來之勉旃故不可以蹇淺辭姑從其説而直書其銘曰歷代真仙樞環應圓汙隆順世隱顯從天重陽發源長春尤盛大振真風全提正令有曰抱陽其嗣葆光太古之孫道價諸方故里經營圓成勝槩福羽以持德輶以載遊居寢息焚修敢忘皇壽以祝地久天長民福以祈簡簡穰穰殷勤旦夕一炷心香巢雲遇真記秦有巢雲者不知族氏及何許人也避始皇版築之役而逃於大行之麓披榛攬葛登極延險直趨高遠深邃鳥道人迹之不可至者而後止焉木食澗飮尋及茂林叢灌營巢而處其上故號巢雲斯人也方自擾攘迫側之間損其俗纍出於世網如脫兔焉木石為鄰鹿豕為侣幸免人世驅率淩虐之苦特以散誕無拘自樂誓將終身焉久習虛靜玩間中之日月始覺其長步物外之雲霞不勝其喜追憶曩日雜紛紜之白蟻冒汨沒之黃塵如在烘罏沸鼎炙爆煎煮其苦楚可勝道哉今也雖踐豺虎之徑路攀猿猱之嵒穴而與世殊絶豈有他哉冀獲解緩輕安不擾性命之情故也或行或立或坐或卧躊蹰四顧山寂寂水泠泠鳥之和鳴獸之馴狎草木競秀峰嶺爭雄以為壺天閭苑紫府瑶臺神仙窟宅無過此也時復松陰草徑被髮行歌林際溪邊孤身影舞其自得也如是棲遲有年俗慮泯絶不知人世之易為漢邪為魏邪不知自身之幻為物邪為我邪厭黃精飫蒼术飲清泉坐白石形解恍惚猶如假寐有一老仙青鬢方瞳美髯丫髻手拈芝草足履慶雲降於坐側指而呼之曰吾子痼疾山林膏肓泉石則與顛瞑於塵境者無以異矣特樂其靜久必繼之以哀而動矣吾今付汝以無名之朴以鎮之則可解汝之靜縛而超乎崑崙之上汝欲之乎巢雲遽然而起再拜稽首膝行而前曰敢問其方老仙咄令默坐瞑目掩耳乃以利刃剖其胸而刳其心然後合之傅以神藥畢曰無名之朴仙聖之種置之胸中矣汝當護持既而杳杳然冥冥然不知其所以然而然也良久之間若寢之覺若醉之醒顧視其傍失老仙之所在捫其心胸平復如舊頓覺空洞惺灑精神爽朗和氣橫敷具體恬然天光內發清靜本然亘初靈物寬舒自得滄海之闊不足以喻其大雲水之間不足以比其優透脫玄關玲瓏智藏得無見之見解不知之知混冥與天地並生和同與萬物為一無彼也無此也高厚內外一體周遍巨細洪纖一性含攝然後鼓舞提携哦無聲之詩吹無孔之笛彈沒絃之琴唱無生之曲聲振天地而世未之嘗聞也以致龍吟鳳嘯鶴舞鸞翔躡景淩虛乘風御氣皆可為之而能不為也居山歷久樵獵者偶而見異之名不可掩漸通蹊徑間有一二好道者尋及參謁時有士人榮伯華聞巢雲之風不憚崎嶇而往觀之與偕來者數輩既至視巢雲山谷枯稿之狀責之曰大丈夫胸蟠錦繡氣吐虹晲首出庶物澤及羣生建大功處大名步金閨鳴玉珂在鳥則為鳳在獸則為龍不曰寧為雞口莫為牛後此人情之所共欲也今子獨戚戚然局局然縮首於深山窮谷曾鯢鰍井蛙之不若何不憤之堪乎巢雲舉首仰天而噓徐而對曰子不見夫天地之間一氣之流布陰陽之開闔雲雨之變化日月之照臨風雷之鼓舞霜露之生殺用各不同此本乎天而親上者也山之靜川之流火之燥金之堅木之植石之固禽之飛獸之走魚之遊蟲之動蛸翹蠢蠕各稟不同此本乎地而親下者也素分已定不可相易已定之分不可惡日新之變不可知而人以知識妄計將以力取安有躐等而得之者乎所謂不知常而妄作也然秋毫之微太山之大彭祖之壽殤子之夭崇之富憲之貧素分已定矣以道觀之有形有數倏忽皆空則大小壽夭貧富貴賤無以異矣吾有非小大非形數無壽夭無貧富無貴賤者存於中歷劫不壞亦已定矣復何慊乎伯華曰有奇材而用於世則能庇於人今子為人而無用於世乃無用之人而已巢雲曰汝以無用為苦而不知有用之害也物之生以身口之逼為人所制而苦其生如馬之致遠牛之引重韁勒在前鞭策在後特以芻菽之安而殘其性命之情也故曰巧者常勞智者常憂直木必伐甘井先竭漆有用則割桂可食則折膏以明而煎炭以熾而蠶以繭而烹鳥以言而籠此皆以世有用而不安其性命之情也伯華曰無用固善其如養生何巢雲曰世之所謂養生者不過充實其口體而已是知生之具而不知生之主也生之所主者神也神存則生神逝則死貪生求養殘虐神主特以香味供其口鼻色聲娛其耳目六欲七情三毒五濁諸妄百邪皆傷其神神傷則逝神逝則身亡身亡則吾生何有此世之所謂養生者果不足以存生以不得無用故也伯華曰何謂無用之用巢雲曰汝獨不見夫水之不動而澄鏡之不垢而明者乎物來斯照應而不藏往而不留照而無照用而無用所謂無用之用也無用之用故不勞其體而體常靜無照之照故不傷其明而明常然若心也自求有用則視不用目聽不用耳言不用口嗅不用鼻拈不用手行不用足四支百體俱為不遂若風痺癱痪之人也吾心無用而百體為之用昊天無為而萬象自馳大地無能而萬物自化無用也無不用也無思也無不思也無為也無不為也天地相通造化相同鬼神莫測巨細洪纖皆具吾性中經萬劫而未嘗變壞豈肯以塵垢粃粳幻化形物為事哉去汝鄙人也無亂吾事伯華茫然口張而不能𠱿良久拜辭而退開州神清觀記夫道之所以興乎世世之所以興乎道道與世交興則俱飮玄化忘其覬覦攘竊之行人日遷善舉安其性命之情而無犯分亂常者不幾乎平泰之時矣道之於世豈小補哉方膺皇朝革命百廢俱作長春真人應召之後稅駕燕然石髓重開瓊函再啓天下之嚮風者奔趨接迹其立志超卓為人之所不能為者有張公先生乃其人也名志信號逍遙子彰川人賦性剛決芥視塵纍丁貞祐南遷之亂居民嘯聚互相攻剽先生慮禍所及以身為大患自逸而之深山窮谷思所以出世之方而未之得也聞棲雲王老師開道盤山而方來之學道者多從之遂不遠千里趼足往覘其所以而聶許焉久之獲預席下鄭重參謁曾無少怠曲盡其妙辭師下山鶉居鷇食心之所存非向之有我者之能為也特以天地為蘧廬形骸為逆旅衣絮帶索面垢首蓬歲時寒暑之易一如也自始及終其志不變若有人之形而無人之情視塵物之往來人事之膠擾猶鳥雀蚊虻之過乎前未嘗介意非有得於中者能如是乎蓋塗隙守神藏身深眇而得其所謂大本大宗自亘古以固存者歟世以迹觀之特見其制行清苦而人不堪庸詎窺其閫奧而識之哉丁亥秋七月先生步及澶淵是俗灑然異之有尸而祝之之意焉縣令趙侯見而敦請留居於靈顯真君之廟時往餉之自是遊其門者日數之而不及也其徒數百人坐不教立不議虛往實歸者有之會首蔡公喜其為人也以己廟側之田文而畀之别為卜築締構俾居而廬之安撫使王公嘉其制行嚴謹裁成費助浸興是觀崇修正殿以奉三清次建堂厨以延靜侣丈室序列以宜福地告成走請於宗師真人額之曰神清嘗試論之人由道立道由人弘得之於中應之於外是以亢倉子之在魯而細民有社而稷之之思列禦寇之適齊而五漿有爭而饋之之敬蓋存己之性以混天地萬物之性則無所不通保己之和以合天地萬物之和則無所不至由是觀之動高厚感鬼神入水火貫金石巨細皆應而況於人乎夫飮人以和者孰不愛敬之哉逍遙子張公可謂有矣其徒趙志完誦其人之志操思其所居之陳迹將刊諸石以壽其傳囑豫為文固辭不可托其説而紀之太歲強圉大荒落春正月望後五日記雲山集卷之八終
