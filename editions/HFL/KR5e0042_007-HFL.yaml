body:
  text: 知常眞人姬志眞撰重陽祖師開道碑原夫至道出自先天太上卓爾立其宗累聖襲而張其後靈源妙本既發而不蒙幽楗玄關大開而弗閉從兹設教代不乏人然而順世汙隆乘時步驟去聖逾遠靈光不屬波瀾既蕩異派爭流枝葉方聯而紛華競岀散無名之大樸遺罔象之玄珠忘本迷源隨聲逐色正塗壅底道閫荒凉由是聖人復起究天元一氣之初洪造更新應曆數萬靈之會天挺神授而力拯頽綱祖建宗承而載維新紐棄華摭實援溺導迷革弊鼎新而玄關復啓焉重陽祖師乃其人也姓王氏諱嚞字知明道號重陽子本京兆咸陽人骨相魁梧神襟逸邁冥通廣漠密契參寥智徹眞源行超法海大量以虚無爲體骸屋非干玄功與造化爲儔情塵頓息破幻如摧枯拉朽斷疑如碎菌拔茅穩掛洪鐘高懸寶鑒眞自甘河之遇密授神丹靈從酌水之通衝開智藏是以性天凝寂覺海汪洋塊坐南時淵默之雷聲忽震舄飛劉蔣圓明之月照無邊猶示地文深扃天府活死名墓示絶後之重甦靈位爲牌表亘初之自在瓊英特秀而識之者希石髓重開而遇之者罕於是方求續焰知音之徒預知其在東海之濱也遂焚庵拂迹策杖雲行語人曰吾將於丘劉譚中捉馬矣世莫知其意謂徒以害風命之而皆不信也時大定七年夏四月發程東邁及寧海登萊揭虹蜺之竿施雲霞之餌方便神化未及數年引出受道之器者七人内果得丘劉譚馬焉乃道中之龍也遂號馬公爲丹陽子譚公爲長眞子劉公爲長生子丘公爲長春子四子之亞有玉陽子王公廣寧子郝公及清浄散人皆目擊頓悟各令隨方立志鍊己修眞唯携四子直抵大梁寓於岳臺坊磁器王氏之逆旅朝夕相從切瑳琢磨曲盡其妙一日乃謂四子曰汝等性命各自護持儻有所疑質於丹陽吾將赴師眞之約矣翌日果升霞焉時大定庚寅正月初四日也春秋五十有八其恍惚神變載之别録不可具述遷其靈骨而葬於終南時膺大朝隆興崇奉道德長春眞人起而應召之後玄風大振教門日盛至於嗣教清和眞人遂命徒衆營其所葬之地爲重陽宫此昇霞之地遂崇修爲朝元宫焉嘗試論之世之所謂得道者必詳其迹之所爲所謂得仙者必議其事之怪誕所謂長生者必欲留形住世而已殊不知神變出異幻惑靡常乃好奇者之所慕誠道家之所謂狡獪也至於自本自根自亘古以固存而不壞者豈尋俗之所易見易知哉祖師之來傳此而已則氣運之變不可役化機之動未始出逍遥於廣漠之鄉放任於曠垠之野隱顯莫測應變無方細入毫芒大包宇宙在有非有居空不空清浄本然古今常若祖師以此立本以此應世至於蛻形蛻法而直入於不死不生混淪脗合與道爲一焉此亦妄測其迹耳固非其所以迹也其所以迹者雖大辯者不可言詰矣輒鞭駑鈍敬爲之銘元貞壽海混混茫茫葆光天府純純常常祖師西來傳此妙旨揮霍靈空息黥補劓四子相從無爲一宗同心仰事亘古眞容丹成厭世如蟬出蛻蛻形蛻法復乎無際時不可拘方不能礙出入有無神通自在規此靈蹤建之一宫薪薪續焰敷暢玄風終南山棲雲觀碑全眞之旨醖釀有年薪焰相傳古今不絶然而藏身深杳未易發暢者蓋葆光滅迹遺物離人而爲於獨者也其教以重玄向上爲宗以無爲清浄爲常以法相應感爲末摭實去華還淳返樸得老氏之心印者歟皇統之初重陽祖師傑出塵表存神遇化方始輝光遂以是道傳諸海濱數子所謂馬譚劉丘之倫也雖復强本而其教未始大弘也至於國朝隆興長春眞人起而應召之後玄風大振化洽諸方學徒所在隨立宫觀往古來今未有如是之盛也門下有任公先生者其族相臺人也捨俗投玄北遊燕薊師事棲雲眞人從道有年密傳其妙乙酉春下山飛舄行化於秦晋之間以及終南至於重陽萬壽之宫東約五里有墅曰梁家庄世傳古有洞清庵乃重陽神化之所立也未詳其實經易世之後荒蕪四合通鼪鼬之徑而已因有是迹及承京兆府總管給據令射占開擗住持先生乃率其門弟李志懃温志清等數十輩同心戮力經營建立復成是觀前後約七十餘畝徑穿修竹環以清流堂殿僅完廊廡序列方壺在後特室處幽乃蒙宣差權省移刺公主張贊成其事清和眞人爲之題其額曰棲雲以爲祝延聖壽之鄉薦享祈禳之地心香頻炷光揚玄祖之風性燭常然開示全眞之化落成之日命刻翠珉以傳不朽勉爲之銘云圓機日新乃全乃眞持以重靜保以眞淳祖師之來如新斯旨東海之濱傳之數子大振玄風神舟普示浩劫難逢尤宜立志歸其門者豈不尓思夙興夜寐勉而效之洛陽棲雲觀碑皇朝聖祖御極之初思徵有道長春眞人應召之後化洽無垠道日重光玄風大振簪裳之侣霧集雲臻宫觀之修星羅棋布遐荒若此況中夏乎兹洛京之南及一舍古墅曰朱葛左連嵩少右顧龍門萬安之山峙其前伊洛之川注其北中立道觀曰棲雲覈其迹之本末寔棲雲眞人門下四子經始而建之也辛巳秋眞人開道盤山方來修鍊之士多往質疑令聞遠播黄冠野服遊其門者不可勝計亦當時輔教之首出者而四子一曰崔志隱二曰管志道次曰董道亨次曰李志希俱在席下參學有年皆蒙印可其心莫逆相與爲友甲午秋九月共議采眞之遊乃自北而南遍歷燕趙齊魯之間乘流坎止未及覃懷當是時也始經壬辰之革河南拱北城郭墟厲居民索寞自關而東千有餘里悉爲屯戍之地荒蕪塞路人煙杳絶唯荷戈之役者往來而已丙申夏四月數子渡孟津而游洛京暮及陳昌遇故人石公見而驚喜相待甚厚眷戀不已留居數月周覽山川明秀與心會處以安蓬蓽而及朱葛顧視四方何異深山大澤迴絶人境棲眞養浩不無助焉訪其鄰寔董道亨之故里也備知土地磽肥彼此畔埒皆荒蕪四塞藜藋參天殊無主者惟存廢址瓦礫而已數子於是議經道觀爲之張本繼而王楊江李尋至同心戮力有作爭先卜築垍茨芟薙墾擗摧枯拉朽剪荒榛枳棘之叢解穢除紛樹火棗交梨之木朝勤暮止日改月化幾二十年是觀浸興立正殿以奉三清後眞堂以尊衆聖雲會在右芬積居東附近門墻膏腴之田六百畝栽培覆護果實之木千餘株檜栢蕭森門庭清肅養生儲蓄取諸左右而豐敬接方來兼有自他之利尊師報本奉國薰修祝贊璿圖祈禳士庶雲霞萃止師眞往還乃爲東道主也甫成而後額之曰棲雲蓋取其師之道號云冀不忘師也三子之能事既畢從師歸汴唯李志希主之有年而不替克成其事善守者也崔子復贊成其像歲次昭陽大淵獻春正月執事者不遠而來致敬祈予贊語以紀其實義不可辭勉從而直書其銘曰大哉至道無門無旁不即不離四達皇皇聖人得之終身所存老氏發源傳嗣萬世近代重陽其龍其光長春相繼眞風益彰棲雲至德知白守黑惠慈利物爲天下則四子明儔克紹箕裘采眞龜洛朱葛興修琳宇一區芝田六頃火棗千株具瞻萬境晨香夕燈衆善奉行自天降祐何福不臻盤山棲雲觀碑道無形埒得人則行山無高下有仙即名此物理之冥符人事之脗合也漁陽西北之山本名四正古有田盤先生者田其姓也未詳何代自齊而來棲遲此山歲歷已久得道成眞雖獷獵庸樵莫不敬仰遠近風化人因名此山爲盤山焉兹山之顔紫峰之下懷抱爽塏明秀端正號曰中盤縹緲雲霞之洞府也累經劫代爲浮圖氏所居會金天失馭劫火流行陵谷推遷物更人换復爲茂林豐草豺虎之所據焉時膺大朝隆興崇奉道德棲霞長春眞人起而應召甲申正月復還燕然建長春宫由是玄風大振四方翕然道俗景仰學徒雲集門下有棲雲子者密通玄奥頗喜林泉飛舄擇地其徒有張志格等庚辰歲預及此山薙荒擗徑披尋故址巧與心會遂營卜築辛巳春承本州同知許公議請棲雲眞人住持此山應命而至居無幾參學奔赴虚往實歸日數之而不及也席下皆茂德耆宿履踐皆抱樸明眞徒輩日增遂營爲觀丙戌春疏請長春眞人作黄籙醮事眞人因題其額曰棲雲觀焉厥後名播諸方京師官僚士庶復請出山住燕京天長觀丁亥秋眞人昇霞之後大師由是率衆南邁所過者化郡縣郊迎隨立宫觀創新葺故者不可勝數皆其門弟所主焉特於南京重陽祖師昇霞之所鄭重傾心搆朝元宫最爲壯麗也原夫棲雲大師立德建功造始於中盤大成于梁苑其贊助眞風輔成玄教亦由時之盛者也此特紀其實迹而師之所以迹者殆不可以言傳也後之學者亦宜勉旃敬爲之銘田公先生人物之英玉石之榮泉源之清神變罔測不留影迹山有其名公懷其實久假浮屠於今始歸猿鶴並集雲霞以依棲雲老師復主張是敷暢玄風無遠不至王之與田削去二邊千載一合薪火之傳松風竹月水聲山色出示吾宗惟居之得山舟密移行莫遲遲重玄向上勉而效之高唐重修慧沖道觀碑無何之鄉廣漠之野有方外之遊者二子焉一曰延眞次曰永眞延姓賈氏名志希永姓李氏名志端延眞之祖出於鈞永眞之家起於嵐鈞南嵐北途經數千之二子者相與遊於世胥如志也俱以服膺道術爲業繼長春清和之風而歷久不渝其純信之篤而能刳心厲志掃除狂妄以至骨立而能超卓於世俗者其所見無全牛而游刃恢恢有餘地耳時無止分無常水金禪代之交陵谷變遷之際諸夏雲擾朔南未寧生民塗炭迫側而心跡自致灰槁者有之况久於其道者乎懷玉於中同塵於外人無識者壬辰之運延與永相遇於漯水之城隈目擊神會相視而笑莫逆於心遂與爲友或裹飯相餉或力作自娱二十餘年猶斷金臭蘭未始相離也崇墉之顔有菴之故基二子於是拓摭瓦甓治平高下採之築之堂之搆之畦蔬園圃倚阜臨溪列植蒼官雜以文木閭苑壺天之邃靈源洞府之幽未異此也是謂慧沖道觀之二子者挹挹然於其間雖市井之喧闐而耳若無聞境色之紛華而目若無見機械不藏於胸次虚白不昧於厥中所作與人同所養與人異眞修混沌氏之術者歟與夫登壠而爭先坐乾没而無足者固有間矣詎可同日而語哉亦内外之不相及已丙辰夏五月朔叙而銘之其銘曰玄教心銘資深性成了眞非妄惟一惟精大體完全必靜必清中主而正自成而明道傳二子延永其名斷金之友蘭若斯馨俯存方輿仰事圓靈若愚若慧如醉如醒在攖而寧與物皆作山路不迷洞扉無鑰秀木蕭森靈苗間錯忘懷市井無異丘壑雞犬放收蘧廬寄託嚼蠟世味分甘天爵膏粱不願隨宜飮啄無幾無時仰參寥廓長春眞人成道碑眞人族姓丘氏諱處機字通密道號長春子祖居登州之棲霞宿禀仙姿聰敏博達神襟逸邁識度不凡未弱冠之一年穎然頓悟棄累投玄而參訪焉大定丁亥春正月重陽自陜右而來訪求知友始及崑嵛眞人聞而往觀之目擊神會遂師事焉親炙左右重玄理窟日以發明繼而同志偕來謂丹陽子馬公長眞子譚公長生子劉公玉陽子王公廣寧子郝公數子同師遂結方外之心交泛全眞之法海荷師資授受皆能服膺而各得所傳居無幾重陽惟携馬譚劉丘而行聲傳四海已而之汴復寓岳臺坊之邸中頓致數子久之付後事於丹陽無疾而返眞焉四子護靈襯而歸殯於終南喪事既畢各議所之分方立志於是眞人乃遊秦隴戢迹磻溪簞瓢不置蓑苙隨身物我俱忘心宇泰定六年而造妙以至出處語默動容周旋無非道用玄關啓鑰天府開扃知藏充盈辭源浩瀚一言之出人競誦之聞其風者梯山航海以來觀遊其門者步武摳衣而上問聲名籍甚山斗具瞻大定戊申春二月世宗遣使徵赴闕庭掌行萬春醮事特旨住全眞堂屢承接見問保安之道眞人諭以抑情寡欲養氣頤神發明道德之宗剖析天人之理上大悅而益敬之明昌辛亥復之海上而居濱都之太虚觀同道者咸師尊之請益則以功行罪福爲戒泛應則如酌水投器隨方圓大小取足而已其人多以自埋於民草衣木食者有之志操相尚世莫知其所以也故教未易大行乎天下時膺皇朝應運奄有區夏朔南始通德譽上逮己卯冬十月上遣便宜劉仲禄率輕騎數十攙搶開道逕及海濱奉詔徵師眞人以天意所存不辭而發軔侍行者一十八人皆叢林之傑出者指程西北跋涉艱虞萬里龍沙繼及行在上嘉來遠之誠重慰勞之一日問以長生之藥眞人曰有衛生之經無長生之藥上嘉其誠每召就坐即勸以少殺戮减嗜欲及慈孝之說命史録之癸未春特旨復燕敕建長春宫主盟玄教天下之冠裳者咸隸焉仍賜金符其徒乘傳往還奏對敕蠲門下賦役自是玄風大振道日重明營建者棋布星羅參謁者雲駢霧集教門弘闡古所未聞眞人年登耄耋席煖燕山普應諸方遠近咸化祈晴禱雨剋期而應蓋天人之相通毫髮無間也丁亥六月天大雷雨太液池岸崩而水竭北口山壁摧而聲震師聞之曰山之摧池之枯吾將與之俱乎秋七月朔後九日果示寂焉享年八十有一葬靈骨於白雲觀之處順堂戊子嗣教清和眞人承朝旨封尊號曰長春弘道通密眞人嘗試言之眞人降世厥德以常握太上之玄珠佩重陽之法印志堅金石性潔冰霜泯浩劫之塵情破多生之習障靈風拂袂性月橫空大明乎根幹泉源滋蔓乎波瀾枝葉知常安靜復命致虚金丹大藥之成火棗交梨之實神通自在應變無方具天地之大全復古今之大體周行不殆獨化卓然此眞人所以成己而爲天下大宗師也道之所在物自歸之和氣橫流無遠不至崇修宫觀建立門庭敬圖象外之尊敷暢玄中之教指天眞而開徑路濟苦海而作舟航登之者必通行之者必至凡有足者皆欲及其於道也此眞人所以闡化羣迷維持正教也曩者國朝初興天兵暫試血流川谷肉厭丘原黄鉞一麾伏屍萬里馬蹄之所及無餘地兵刃之所臨無遺民玉石俱焚金湯虀粉幸我眞人應召行在微言再奏天意方回許順命者不誅指降城而獲免諭將帥以愍物勉豪傑以濟人在急者拯以多方遇俘者出以貲購婢僕之亡從道者皆恕卑賤之役進善則放良救人於塗炭之中奪命於鋒鏑之下使悛惡而從善皆道化之弘敷也天下之受庇者多矣亦有不知其然者雖利天下不言所利眞人有之德掞天壤性超帝先或者以耳目聞見妄測之皆得其迹也跡則非其所以也其所以跡者大智不能知大辯不能言猶戴天而莫知其高履地而莫知其垕妄測之者皆聽瑩也李公大師不遠而來命紀眞迹之崖略將刊諸石以壽其傳亦報本尊師禮也義不敢辭輒從是說謹齋沐而直書其銘曰長春仙公氷雪其膺山海之秀人物之英微慮必克純粹而精直超幻境高居九清降爲帝師光耀神京獨往獨來即本即迹化機萬變吾宗惟一長生久視重德之積千載逢遇沉淪頓息不識不知玄恩波及大庇吾門昊天罔極咸寧清華觀碑京兆之西四十里川曰華嚴山水明秀之所鍾竹木鬱茂之所庇左連杜曲右接白雲玉案之平極於南鳳棲之原倚其後中之墅曰夏侯琳琅晻藹之間有觀曰清華覈其所起自宣差總管田侯泊儒公大師之張本也貞祐南遷之末金湯虀粉人物劫灰河外陜右之民廢而後復之未遽寧也兵塵騷屑曠野平蕪視向之所有失之者十九思以振僵植仆救療民瘼誰其尸之蒙宣差田侯奉命來蘇疾小間也田侯諱雄祖全州人初以勇武聞壬午擢爲隰州元帥兼節度使四方向風慕義不召而歸者多有之癸巳秋九月以征討有功遷陜西五路總管存卹軍民懷來郡邑治政之暇兼崇道德凡所營葺皆力贊之與儒公大師有昆弟之舊聞謦劾而敬信之篤而能服膺履踐悛惡而善者從之釋俘虜之族千餘輩其易悟者歟儒公大師諱志久儒其姓也全州人自幼而道師事樓雲眞人親炙有年密通其奥杖履諸方西遊吉隰丙戌耆艾請住祈眞觀癸巳田侯請住京兆迎祥觀暨而尋及夏侯之里躊蹰四顧清絶可觀曩爲名公達士遊息采眞之地忍視蕪没縱狐兔豺狼之嘷嘯於其間遂擇隱約摭瓦薙荒垣而限之經内外之田以畝計者二百八十有奇立文以界之儒公乃卜築於是以至聖宇眞堂靖廬特室隨宜序立足以栖遲清侣鄭重薰修夤敬盟眞祝延皇祚以報洪恩之罔極也落成之始走請於宗師額之曰清華壬子夏四月眞常眞人承旨代祀名山大川以暇及此喜其地秀人傑信宿而還觀夫天之開圖地之孕秀山之靜水之流蒼翠惟此君周旋無俗物清入毛骨豁爽神襟宜乎栖心鍊性者之所居固可朝夕於是造次顛沛而不離於是神物俯仰不無助焉其自得之妙可盡模哉一日執事者不遠而來囑予紀實不可以蹇淺辭輒從其說而直書其銘曰森碧琅玕鳳原之顔觀曰清華晻藹之間逈入毛骨靜掃神姦雲霞其侣玉笋其班爰遊爰處以安以閭居以特室應以樞環靈扉無鑰洞户無關所以爲達者之蘧廬冀眞仙之往還也鄢陵黄籙大齋之碑道運而有氣氣變而有形形之變而有巨細洪纖飛潜動植氣之運則有升沉消長生滅廢興若萬象之斡旋無首無尾若四時之代謝不古不今此天理之常然造物者之無盡藏也在氣運故新之革時數終始之交未有安而待命順而不悍者也當其時則急於得而以力取差其時則執其失而以力爭以致伏屍萬里殺人盈城有死於鋒鏑者有死於木石者有死於火水者歷代無休連年不息原野厭人之肉川谷流人之血蓋逆天背時故如是也湯武而下禪代之際莫不如斯爰自大朝隆興金源失統干戈不息以迄今日幾四十年矣馬蹄之所及則金湯虀粉兵刃之所臨則人物劫灰變谷爲陵視南成北比屋被誅十門九絶孑身不免萬無一存漏誅殘喘者孤苦伶仃覆宗絶嗣者窮年索寞憑誰薦拔空負寒心況在黄流之外疆場之郊當此之危甚於他所驚魂滯魄長劫難伸須仗玄勳始能解脫今蒙醮主某官等興大慈願發上善心乃就某觀修設无上黄籙大齋供養三清玉虚諸聖位昇仙與度魂相對明善惡之殊塗南昌與北府爲鄰示仙凡之異格潔清壇墠整肅方隅延降高眞希垂景貺仍敦請南京朝元宫棲雲眞人掌行醮事意者薦拔某路無主孤魂泊各家先亡滯魄有親無力附簡提靈伏冀孝子順孫思宗念祖各罄丹誠具瞻眞聖香花燈燭藉爲慧照光輝星斗壇場權作彌羅境界俱沾惠澤淹沉枯朽俱獲重蘇高蹈慈航鬱結幽明皆承濟度新疏慶賴宗祖超昇上願皇圖永固聖德惟新邊鄙休兵士民樂業十方三界六道四生有識無情俱蒙道廕今此玄壇潔備法事嚴行略序片言紀之於石雲山集卷之七
