canonical_identifier: bkk:krp/KR5e0042/CK-KZ-jye/v1/juan/4
seq: 4
front:
  text: 其八天倪本分具神通一體洪纖用不同試向東風問無語柳稍青淺小桃紅其九天鈞無我亦無人萬有浮沉局局新殘臘盡時囘煖律野花芳草一般春
  hash: sha256:5d9a2f7ac18f7f127b5fb197458ba1926a35c6fb2882118097f21e363a34b055
body:
  text: 蘆葦瀟瀟幾度秋可憐人老未歸休細鱗不食雲霞餌空向晴波浸月鈎無樂無知有活機不妨人侮太愚癡誰知無樂無知者一點閑愁許上眉杖藜宜訪知心友茅屋須鄰得意山益友好山相對面不妨終日笑談閑奪得玄珠唯罔象正宜恬智交相養年深放出大光明照破乾坤無盡藏窻戸風清月滿懷灑然飛步到蓬萊世人不得愁城破殃及壺中麴秀才赭沫天倪勢不拘縱橫寰海任馳驅太平無象人難遇赤水空沉罔象珠閬苑飛瓊舞翠霞遺簪墮地長成花聯芳不斷傳青白付與雲山道士家萬塵削落氣神安默轉當空活眼環不意有詩來觸撥五雲歸路不相干山色密傳眞造化水聲敷演道因緣良心用處縱橫是何必猖狂肉案前亭下風清衣袂寒山前行客汗垂顏仙凡不遠雲泥隔名利催人不放閑暑去山中渾不知怪來黃菊競芳菲西風一日傳嚴令錯落半天紅葉飛霜雪摧殘錦綉空四圍山色舊形容夜深特室燃香坐一色風鳴萬壑松句裏搜尋向上機迷家稚子轉忘歸不知突破窗間紙放出癡蠅自在飛海童戲水鷗先覺痀瘻持竿蟬不知深眇藏身無所住季咸相見恰如癡動必隨他靜必癡兩忘中有活關機直交無舌人能語始信名言果是非中原狼虎怒垂涎幸有桃源隱洞天流水落花依舊在請君乘取斷頭船羣仙高會話方壺笑指蓬萊水漸枯莫更飯牛歌白石好尋罔象索玄珠枯湫死水無魚釣輕餌篠竿盡日閑不似會稽任老子小舟和月夜深還弱喪家園已不知忘羊路上轉增迷早囘收拾雲霞餌一棹清風明月溪浩浩靈風縱掃除性天揮斥片雲無乾坤一色如銀界放出光明不夜珠倏忽光陰一擲梭須臾衰老鬢雙皤閻家不測來追喚手足慞惶奈若何心機用盡幹家門白髮垂垂眼又昏未後不知何處落臨行猶囑付兒孫百歲光陰頃刻間貪婪終日用機關一針一草皆前定剛使身心不暫閑閻老無情孰不諳目前光景且貪婪莫防一日來頭上沒可支吾何太𤺍草木叢林總是玄泠泠寒玉潄流泉坐忘遺照人誰解露滴松梢月正圓風林月障照山花嵓石溪流共一家唯有閑人堪作主無情無我伴煙霞修眞眞處亦何修咄盡諸縁萬事休成就本然功德性步隨明月上瀛洲神仙莫向外邊尋止是元初一片心灑落萬塵籠不住立教大地變黃金自有延年不死方好傾丹悃問醫王凡心刳盡投神藥蟬蛻分明脫苦囊布網張羅積業多晚年信口念摩訶執迷妄想來生福閻老如何𧬵得過爲周爲蝶兩形分未見誰爲作夢人栩栩蘧蘧消息得寥天大地盡吾身天眞用處盡通靈穿貫無形及有形妙用驅馳隨處是月明江靜酒初醒亘初無樂亦無知知樂纔生第二機循本卻尋知處起游魚彼我自同歸塵事堆山積嶽來解如無解刃恢恢交加未肯剛批判密護神鋒不浪開聖智滑稽迷大隗野童病瞀卻師天纖塵害性須除削露出元初妙不傳元初悟徹便休心自是無心功更深坐處木雕泥捏似世間何物敢相侵丈人猶自未忘機蜩翼藏身蜩不知更到鬼神不測處拈來信手更何疑己之靈是物之靈己若無心物自甯空界偶然通一線海鷗不敢下沙汀人心猛過山中虎敢放斯須喜怒生安置本然清靜地兩忘物我自和平勞神爲一不知同有識俱爲造化籠數定倒顛無損益妄生憂喜怨狙公妙玄靈跡浩無涯大地全形共一蝸塵世小於頭上角可憐纖悉謾爭差不材山木自全眞野鴈無能卻喪身道用日新窮變化或離或卽妙通神大器洪才未易求揭竿滄海餌懸牛乃公豈是撈𧎚手蹲坐三年不上鈎不萌枝上剩龜毛在手蛟虻見影逃堅起示人成按款坐看平地起風濤便面龜毛兼作拂犀牛不寫嫌粗俗靈風隨手澹相宜秋月遙山清可掬世事紛紛大足云一瓢一衲舊隨身任行任坐無拘束自在東西南北人端拱主人無語句臺輿僕隸鬧喧闐希聲絶相忘言處海水墨山書不全鑿破蒼苔種玉蓮圓明一點上通天俯觀坐彌羅外日月星辰直下旋淡靜虛空著此身宜愚宜拙更宜貧出塵安穩眞消息不可尋常說與人萬事於人戲沐猴化工不息販何樓癡童博得閑拈弄瓦狗泥車打破休化機於物太無情不許須臾眼轉睛拈起頭來還是尾片時作壞片時成皮口朝朝索飯填肉身歲歲著衣纏用心到底成何濟送入荒郊土底眠浮生都在百年中畢竟勞勞到底空爭奈這團腥臭物卻交攖擾主人公蛛絲網几壁生塵老去饕慵不厭貧卻有這籌難可得水雲鄕裏放閑身詩魔潛迹懶看書拙訥忘情若太愚卻坐太平閑日月儘教人作馬牛呼詩魔今已豎降旗又著南華故紙癡打破這團迷種子白雲鄕裏笑嘻嘻四十年來學蠧蟲而今頓覺老饕慵誰知些子閑難得惱殺龎眉舊主公多病苦躭清靜癖好書猶著聖賢魔無端之紀藏諸用奈此膏肓上下何些子機關苦不多緩行不至急行過從今放下都休問唱出昇平一曲歌幻形認有卽拘墟跳出牢籠步坦途造物許饒先一著也勝猶執化人祛白首須當急急修養身粗足便宜休心田潔靜常安穩隄備閻家老子勾幾排黃籙濟孤魂濟了孤魂依舊存自有祖宗歸不得忙忙千古爲兒孫有心絶筆塵猶在立意忘言意未忘有日豁然開正眼能言能筆又何妨虛堂坐卧無人問妙用機關只自知名勢結交如水澹老來方覺得便宜生涯粗足獲安居無事逍遙步坦途寄迹仙凡莫分别大家依樣畫葫蘆朝菌冥靈及大椿短長一例自天鈞而今七十人間少管甚前程幾度春穩乘神馬駕尻輪南北東西逐日新拖去拽來從尒耳主人依舊沒疏親一顆圓明自性珠本來無欠亦無餘家藏莫使縁塵羃放出神光耀太虚揮霍機鋒快利疏通關竅渾圇恰似功夫成就古今不許常存向上機關透脫匠成眞體圓融妙用縱橫表裏神鋒聯串虛空風清雲翳飄忽地迥參寥晏如鴈字幾行飛去不妨書破玄虛飂飂長風寂泊瀟瀟虛籟平甯萬里寥天空廓一輪孤月圓明青鬢朱顏易失黃雞白日相催夢幻境中識破水雲鄕裏歸來山峙巍巍不動川流混混常閑但得心安若此何勞别扣玄關常啟重玄關楗執迷自間雲泥肉眼中存翳膜瞌頭外覓摩尼展臂時光已失轉頭世事成空俗物幻形有盡迷津苦海無窮足迹紅塵滚滚心田白浪淘淘自向洪波汨沒何能紫府遊遨白虎青蛟莫論丹鑪鉛鼎休詳絳闕瓊林溟幸金壺碧酒馨香日月東西出沒乾坤昇降渾淪眞宰默存厚薄浮生分外貪嗔不苟不貪不愛無情無喜無憂此世此形此數宜愚宜拙宜休亭亭月轉冰輪萬籟消沉莫聞人影不須零亂杳然徑徹無垠輪轉多生浩劫貪圖百計千方八識七情戲弄四生六道承當月透簾籠虛白風生几簟清涼坐久凝然無際不知身世何鄕色裏膠青混合水中鹹味顢頇眞僞欲生分别舉頭不見長安靜盡纖塵不立杳冥三界彌羅物我不知所在靈明透入無何時止時行莫逆滿坑滿谷同塵非物非凡非聖能神能鬼能人見在何堪住著未來不可思惟點檢目前自已起心已間雲泥松菊依稀三逕窗戸明通六如太平事業無象淳正家風有餘聲利場中退步水雲鄕裏閑身順命不湛人僞達生自樂天眞清靜本然未悟貪忙業識無涯逐境心頑似鐵隨流性亂如麻夜壑舟遷捨故日車輪轉趨新縁木求魚妄作刻舟記劍勞神聞見覺知四病杳冥昏默多愚求者捕亡擊鼓執之待兔守株爲道爲儒爲釋水月鏡中三影皆從此處傳來選甚黃冠圓頂荆棘除難盡芝蘭樹不榮故園藜藿合松菊可憐生炷冷香仍在燈青焰亦微斷紋絃再續今古賞音稀妄滅眞重遣心空性自圓百川俱凑海萬曜不離天智巧渾如拙聰明卻似癡可憐千古意不許等閑知病眼唯觀物塵心只慕緣政如蠶作繭來去目纏綿著相終難造求言未可知向人拈不出相對只揚眉燭弄風前熖漚翻水上波不尋安穩地生滅竟如何莫向絰中覓何勞相上尋博通今古事昧卻本來心休探水底月莫認空中花兩足何常動囘頭卽是家交臂成今古抬頭革故新一團空幻事謾殺利名人塵冗何須錄浮生未足誇好栽無影樹疏卻有情枷落絮因風起飛花逐水流古今無定迹生滅有時休塵心忙似火世事冗如麻不省光陰促紛紛逐落花涸絶是非海治平人我山衝開無盡藏跳出有情關浮雲蔽杲日涼風敗秋蘭愛欲未能遣心君爭得安媒翳可射雉利欲能攻心丹田有靈物不鋤荆棘生世事無程限家縁沒盡頭不尋休歇地辛苦幾時休清靜本然眞隨宜盡入神不煩吹煖律寒谷自囘春衰鬢星星白朱顏漸漸枯不期閻老喚著甚可支吾生死門中住輪迴路上行此心來往慣爭肯問前程積塵昏慘慘長夜黑漫漫未遽通三要何由正五官陰陽爲大匠天地作陶鈞從化隨時改趨生逐日新大道理幽深迷人顛倒尋去身渾不遠惟是本來心跋寫眞繪像是敬是仰只斯面目余將安倣向上宗師本無二相月印千江圓明一樣先天不朽眞容如舊得之孰見傳之孰受俱戴天而莫測其高俱履地而莫窮其厚不古不今非暫非久尋源循迹而趨步不停奔逸絶塵而瞠若乎後狂屈欲言而忘季咸自失而走離朱拭眥而不見端倪黃帝聽瑩而不分可否罔象索之於無倏忽鑿之於有品藻者困其心雌黃者辟其口望洋向若而嘆豈容夫默染於丹青之手
