front:
  text: 重刊道藏輯要知常眞人姬志貞撰
  hash: sha256:51c8886767f1dcb0b96cb8c8cffc68132ce488fbb86d5fe0cae2f9d8930bc772
  markers:
  - {type: head, offset: 6, content: '雲山集¶¶¶<md:KR5e0042_HFL_005-001a>', id: KR5e0042_CK-KZ-jye_005-h1, level: 1}
body:
  text: 一點元眞被妄想招來幻化身蟪蛄朝菌須臾情識結習迷雲火坑千丈機詐萬端白浪黃塵謾橫陳向汙泥坑陷苦海沉淪紛紛存亡得失是非榮辱苦因循有時開悟癡團粉碎眼孔如輪性珠穿透方信葆光函蓋乾坤自通神有壺天不夜洞府長春眩烏飛兔走競出沒疾如梭更影戲浮生繩提幻化攛弄教唆吹噓往來變態鬧紛紛平地起風波止是蠅頭蝸角古今翻攪如魔蹉跎勘破驚囘塵夢冷笑呵呵悟本有元初靈明好在無少無多收藏更休點汙對野雲溪水唱山歌月下無人獨步杖挑雨笠煙蓑笑平生幻惑遇牢落物華秋對世路羊腸人心躉尾剛變爲柔紛紜戰酣白蟻向槐檀影裏覓封侯一覺黃糧未熟百年光景都休推求往古來今成底事盡何樓勘富貴浮雲功名畫餅身世浮漚分明眼底見假便一刀兩段不隨流躍出迷津欲浪月明滄海歸舟選峯巒佳處結茅屋伴蒼松有藥圃芝田耕雲釣月香藹靈風憑欄俯觀寰海鼓洪濤千丈接長空幾度蓬萊清淺杳冥淆混魚龍三山聖種猶存聾瞽輩覓無縱笑阿母蟠桃安期遺棗誘引兒童任公巨緇好在犗鉤懸五十引長虹蹲坐三年不見若魚何日相逢萬塵諸累重重一時穎脫如懸解青鞋拄杖鶉衣百衲沿身輕快南北東西浪萍風梗去留何礙許昂簪笑傲行歌立舞縈心事無纖芥不問壺天境界更誰分區中方外如雲似水優游散誕縱橫自在轉首襟期世縁空幻到頭終壞待他時興盡雲霞堆裏結無爲會此身幸脫塵樊累宜更選清涼地山靈招我峰屏岫幌囘環凝翠白石清泉竹軒松逕草堂林際揀憑高穩處儲風養月更誰問人間世壓盡壺天景致笑桃源落花流水箇中時復靈仙高會彩雲搖曳談笑滄溟幾番塵土劫灰彈指倒金壺碧酒鯨波一吸且陶陶醉古今興廢存亡落花滿地香風掃茫茫苦海洪波千丈無窮膠擾俱在天眞浪遊塵境執迷顛倒自玄都别後流離宛轉誰更問長安道但念功名未了聚愁眉苦縈懷抱幾時會得三田靈秀活人芝草霞彩雲英竹風松月藥鑪丹竈煉深根固蒂長生久視永無衰老初機學道道無形著腳如何蹤跡只在靈源方寸地體正元初端的激濁揚清明眞削僞掃蕩諸邪僻迷雲消散密通方外虛實主人堂上無爲環樞應運不許纖塵及徑入無何眞境界明秀高峯玉立瑞氣沖融祥光赫奕忘盡塵樊質逍遥遊宴壽同高厚無極夢中駭鹿戲浮生得失悲歡離合見解分明猶是夢轉轉昏沉難覺雞口人情羊腸世路各自爭頭角揮鞭舉棹一般巇嶮行腳有日猛省心灰塵樊識破方信從前錯林下山間安穩地雲水無情相約自在時光逍遙日月脫盡拘束縛槐南枝上冷看黃蟻行樂功名富貴似無繩縛盡英雄豪傑古往今來同影戲頃刻存亡興滅羅綺妻奴畫堂金玉招感人窺竊繁華粧點大都多少時節自造惡業重重頭皮改換苦楚經多劫爭似抽身聞早省時把狂心休歇世網衝開玄關撥轉自得眞仙訣功成歸去一輪江上明月欲明眞趣便掃蕩多方亡羊岐路脫落皮毛惟存眞實絶盡向時行步一朵玉蓮開展不受纖塵點汙收絳雪飲玄霜依舊神丹圓聚自得無疑慮獨向翠微手植無根樹顥氣橫空靈源浴月光彩一時揮布萬斛寶珠莫比擁護收藏堅固神莫測鬼難呼功滿驂鸞歸去端坐懶成癖雲水興何加襟懷洗盡塵物别有好生涯選甚瀛洲仙闕閙市花街柳陌觸處是光華切莫問龍虎白雪與黃芽不躭詩不殢酒不拈花從來本面公事何必向人誇晝覽故山風物夜被玄天星斗百衲掩雲霞神鬼莫能測頃刻遍河沙徹底探囊篋那得一錢看從來底事活計不與俗相干似得飲中賢聖滌盡澆心酩酊冷眼視塵寰斬斷利名鎖踏破死生關做些癡撒些懶放些頑六門拖拽不出蟄窟且𨈊跧别有非常手段拈聚虛空一片澄澈夜光寒會得箇中意何必問三山興廢閱青史榮辱夢黃糧空華電影蹤跡謾弄恰如狂分外爲蛇添足不省狙公賦芋憂喜兩相忘囘首舊鄕國風物盡荒涼百年身彈指頃鬢成霜人間更莫理會安穩處承當靜夜月明風細相對雲朋霞友談笑興何長一椀洗心茗一瓣劫前香其四漂泊異鄕客踏碎軟紅塵歸來處處庭戸簾幙捲黃昏南北東西行色費盡芒鞋多少何處覓天根光曜問何有亘古窅然存入無何遊太漠越崑崙風仙底箇消息未許等閑聞亂眼空華零落桂魄團圓如舊穿透水無痕尚賴扶搖伯高捲嶺頭雲相遇會心友目擊契金蘭登天遊霧莫逆雞黍不相干常記嵓嵓亭下俯瞰茫茫滄海揮塵笑談間霞捲鎮陽北雲隱鶴山顏歲華遷人事革忽盟寒芒鞋藜杖猶在唯憶扣玄關但願心圓如月表裏虛凝澄澈密密運樞環一點迥無别千里共同看眩目空花紛紛盡如繩緘縛軟紅塵堆裏汨沒認爲眞樂二陸來時忘後患兩疏見處誰先著正夢魂隨蟻到槐安何時覺興廢事曾著莫繁華盛還銷落更不須人勸自宜斟酌古鏡磨開塵外境隋珠枉彈簷頭雀待悟時囘首進前程蓬萊約霞友相從雲房會笑談眞息正鬱蒸天氣輕汗靜中難敵冰玉旋敲新薦几玄冥坐使寒生席命月團時復泛金甌鯨波吸除煩熱澆胸臆功殊勝神通力笑玉川風味趙州陳迹法界澄澄清可掬靈空浩浩光無極問箇中眞味口難言知端的萬論千經俱涉獵欲求眞覺驗古今行迹移在口頭渾錯不向心中團練就多生浩劫空牢落會本眞神口未能言何方學無一物空索索常清淨通寥廓下功夫涵養不須揮霍白雪陽春誰與和村歌社酒爭跳躍看牛毛如許幾人知同麟角百煉千磨成底事襟懷冰雪向積塵堆裏灑落要明心月根本泉源窮到底波瀾枝葉休分别遍世間誰不是行人何須說丹宜秘囊宜結居無室行無轍更莫思人我是非優劣鸚鵡雕籠因解語杜鵑枝上空流血對利名車馬軟紅塵牢藏舌一片頑心何樓子無窮生滅被化機般弄馳騁許多顛蹷販骨如山成底事迷情似海難超越痛亘初靈物久沉埋塵沙劫求出離須猛烈尋知友談冰雪下功夫磨拭壽光明徹風定波清潭底現雲開冷浸天心月問啞人食蜜味如何無言說牢落多生無盡限紅塵蒙羃縱苦求懸解微處不堪形詰猿子摩挲潭底月癡兒咀嚼刀鋒蜜更可憐法網自纏綿何時出燕石寶銅盤日渾淪棗浮萍實這一團打破自通消息截斷葛藤閑惹絆破除谷董狂蹤跡向本來一點便承當眞端的全本無虧眞元不妄從來何少何多靈源亘古天地與同科奈染諸緣萬境生情識招致羣魔難超越虛生浪死苦海任奔波聰明求出離囘機一念訣證無何勘元初本有些子淆訛應現頭頭總是分明在依舊山河高懸鑒又還打破拍手笑呵呵南極儲祥少微呈瑞八旬應現人寰水雲疎散金鼎煉神丹翫盡長春洞府逍遙占物外高閑無衰老龜旋鶴繞相對且怡顏慇勤重禱祝温鑪澹炷劫外旃檀念亘初容貌不許凋殘通古今如旦暮蟠桃見幾度華繁常常在金壺碧酒高會列仙班桃藴蒸紅杏開微白仲春風物宜人蓂疏九葉隴右降天眞應瑞葱葱佳氣寶猊炷劫外濃薰鳴金玉琅琅聲裏高會洞中賓良辰當勸勉仙風道骨早早離塵悟人間虛幻著莫因循看取蟠桃結子靈芝秀不羨莊椿常如此洞天深處獨步翫長春擾擾夢中身世白駒過隙多少時光使盡機關方寸不暫清凉蓄奸邪更移鹿馬執迷網顛倒玄黄最堪傷死生汨没苦海茫茫難忘恩繩愛索火坑塵網利鎖名韁一向貪饕不知青鬢染秋霜覆焦隍空爭駭鹿多岐路謾逐亡羊自徊徨白雲深處一炷心香坰外地偏塵遠結茅小隱事事俱休脫粟黃虀安分足可優游月徘徊昂簪緩步風冷淡懸涕慵收且淹留野雲歸岫煙水橫秋唯收隨身數物靜巾帨手細櫛梳頭鉢置囊閑杖藜百衲外無求唱哩囉招來牧堅相爾汝取次沙鷗更何憂奏刀無礙不見全牛夢幻閻浮捨故趨新倏忽化機潛換天地一坵墟會心冥沖漠野雲舒卷寄迹虛舟鑒形止水風激游絲斷空玉宇無塵清澈混物我冤親相忘鵬鷃鎭樗散此際鷇食鶉居逍遙遊宴聞乎無聲視無色罷金鎞去膜作空花觀窗戸有餘清泯人牛蹤跡素華明煥勝槩幽遐洞靈縹渺直許羣眞翫步坦途搖頭拊臂到醉鄕勝入高陽池館世情遠浮生瞬息歸來晚高會雲朋談笑人間幾度海濤清淺天地一吹噓動閻浮出没化機如電覆手存亡轉頭聚散物物虛零亂謾戲弄蝸蠻槐蟻向魂夢悠悠雄圖堅遠無盡藏山舟密運坵陵移換團空人世竟無識祗形囚浩劫浪傳餘喘種性卻囘邪向銅盤聲裏太陽難辨試運金鎞撥開朦膜眸子尋常見待細察蟭螟若山貫法界靈空慈雲彌滿了眞觀方知下手須臾晩先天有物未始難名彷彿氤氲元氣太極形生雞黃乍判散作萬殊千異總被形囚累恣營營念慮多方百計競聲利揚波鼓浪唯是無窮四事而已空膠擾人間販骨番騰終成何濟誰信火傳棄舊物禪迎新弄我眞同兒戲勘破搖頭伸眉一笑照徹多生凝滯妄構閑非是總休論枉玷林泉風味秋靜夜雲收空界纖塵不動月明如水人長在碧桃影裏醺醺醉遠樊籠虛舟不繫披覽閑中眞趣未嘗羨珂里榮名未嘗羨金閨矩步乾坤俯仰開扃牖晃朗庭衢會襟期徑入無何脫巾奮然箕踞也不慕龍蟠鳳舉也不問文林武庫欲事爲無事無爲欲思慮何思何慮翛然平澹涉人世居居于于向故園管領光風歸來似嫌遲暮坼封緘龍團闢破柏樹機關先見玉童製香霧輕飛銀缾引靈泉新薦成風手段虯髯奮擊碎鯨波仗此君些子功夫瓊花細浮甌面這一則全提公案宜受用不煩寵勸滌塵襟靜盡無餘開心月清凉一片羣魔電掃瑩中外獨露元眞會玉川㩦手蓬瀛留連水晶宮殿玉童報朝徹仙夢斷華胥太平國素屏側金爐煖灰襯雲心虛白御封坼一瓣纔拈清馥馥氤氲滿靈空無間隔遍飄三境融融通高厚貫金石神州初凝玉釜記不萌枝上微露春色幾人識塵凡阻豈許垂瓜明得氣綿密洞府高眞俱默會遊蜂蝶紛紛無處覓杳然曳縷虛凝入寥天一蓮塘雨初歇波面倚瓊花照澄澈命童折銀鉼浸姑射仙姿凝潔默時說大地寥天俱捻聚無巨細收來藏貝葉放開微蘂眞光塵沙界盡朝徹一枝冥傳亘古向無聲色裏出廣長舌莫分别纖毫受入眼還同金屑拂陳迹物物般般無盡藏閑桃李眞容俱漏泄再拈誰肯承當付花梢月自爲形所累寒餓交侵贅疣何異試究虛玄從初本有一點圓明無際塵縁漠漠似千里晴空幻生雲翳仗此靈風一時吹掃莫留滯來之翛然往焉適耳從伊粧點鼠肝蟲臂變化洪鑪存亡皆可除外甚麽堪畏逢魔遇阻駕神馬尻輪去留誰計穩坐忘懷始終憑此志羃羃塵埃嘆自古悠悠不省沉埋利名場上人我叢中單認這箇形骸念本來一點誰無分都是仙材謾疑猜喚千聲酩酊不肯頭囘何日夢中驚覺管識破從前白蟻庭槐洞天深處霞友雲朋談冰咀雪相陪對紫芝幽圃香風裏碧酒傾盃信悠哉有龍蟠虎繞沉醉蓬萊帝錫嘉祥正九五龍飛大業繁昌斡旋洪造整頓乾坤雷轟電掣成章向玉京金闕威音震膽裂遐荒勝陶唐應羣眞交會四海平康甯論普天率土但蠢爾生民共賴胥匡蛸翹𧍒蝡葵藿傾心曷報惠澤恩光炷蘭薰瑞靄祈黃屋枝葉聯芳祝吾皇願龍圖永固聖壽無疆身世蝸蠻在一氣盈虛宛轉循環電光影裏石火星中生滅如許時間盡勞神膠擾名與利抵死相干自摧殘爲一團虛幻百種機關睫在眼前不見但認假爲眞倒大癡頑太平難遇眞道難逢識取舊日家山到無何鄉裏雲霞步玉蘂芝蘭會仙班慶長春天上來滿人寰肥馬輕衫富貴裏功名心醉如酣枕中春夢誰信鵬程摩天巨翼圖南被目前虛幻空攖擾枷鎖擎擔更何堪向蠅頭蝸角苦苦貪婪他日眼開方省便聲利場中稅駕停驂著鞭方外打破疑團冷笑暮四朝三現本來一點凝然在秋月寒潭箇中參聽金童謠唱玉女玄談枯木寒灰寄野墅茅堂冷淡林隈地偏人靜月朗風清窗戸絶點塵埃有自然消息銀霞璨珠玉瓊瑰信悠哉看龍蟠金鼎鳳舞丹臺舉世利名心醉更誰仗鵬程密網衝開此言還信倜儻男兒休更撒手空迴認空生虛幻何成濟枉玷仙材早歸來赴蟠桃高會談笑蓬萊一點靈源澄湛照徹多生浩劫情塵有不夜壺天風物亘古仍存踞閫玉麟哮吼對床石女談論海童微念寥天晴雪不下鷗羣蛸翹蠢蠕同入吹噓寒谷爲我囘春那更有越吟思舊楚些招魂儘恁銅盤蠟炬摩挲晩照餘曛神丹旣濟玄珠好在默默昏昏林下山間人市處處天遊在在玄虛更不許絲毫增損具足無餘漆桶甘沉黮闇戲場自作塗糊枯骸隱几蒼天誰問枉用吹噓形名寓耳覼縷眞容非鉛非汞非珠縱舉似百端拈弄妙處難模誰有輪扁手段成風去堊功夫頭頭物物洪纖巨細色色如如二十年間曾記對語山陽森碧琅玕談笑裏蓬萊清淺陸漲波瀾驚喜靈根無恙雙明玉樹同看攙搶境裏漫漫長夜共話團欒余生散漫江海虛舟一葉不揆循環俱老矣關河千里晤語良難自笑烟霞痼疾半生風月長閑别時好在雲根水骨相對怡顏春氷初泮長川洶湧桃花碧漲波瀾海若幸臨馮夷自笑靈源退鷁來還塗抹興闌珊便截斷懸流撥轉機關囘首人間底事膠擾蟻循環蘧蘧世夢驚殘顧雲開岫幌月賁山顏芳草藉茵森松偃蓋峰巒聳碧欄杆天地許多寬方自在無拘心契金蘭寄語功成事遂佳處莫盟寒百年光影綠鬢須臾改擾擾勞生是非海料存亡隱顯盈虛興廢事盡默聽玄中眞宰甚狗苟蠅營爲浮名薄利苦縈心萬般機械閑中一著莫妄生枝派平地瀛洲故人在運靈風掃蕩情塵須勘破生死牢關懸解便領略玄珠用無窮得自在逍遙去來無礙千魔萬難苦海沉淪慣枷鎖渾身强牽挽認簷溜一點浮漚來又去識不破空華虛幻便酩酊朝昏又誰知在本有眞靈萬塵羈絆夢囘酒醒子細開青眼閑裏光陰著心看髑髏元不會東西還戲弄千古輪迴無限但省後收心便歸來莫只待西山日沉天晩浩浩靈源自先天恍惚難貌形狀殊非想像罷兔角龜毛頭頭分朗百般呈伎倆盡分外無風起浪截斷亡羊路山雲野水相與復相忘神光照應無方示灰寒地文舒緩天壤低頭放杖便擊木無聲敲空作響不須求罔象得自在無拘縱放信手拈來用如意寶珠無盡藏嚼蠟塵情誰知淡然無味販何樓一場兒戲看成空渾不懂夢中身世謾橫陳使機關到頭何濟省後俱休尋箇久長之計便收心破除人僞遠樊籠捐俗物洞天嘉致結雲庵對西山萬峰凝翠薄利浮名抵死向前忙幹更光陰暗中催斷傀儡棚詳攛弄般成公案下場時盡盧都不堪重看風遞晨鐘驚覺夢中青眼覺從前盡成虛幻火坑中安穩地自由人揀早歸來莫秪待日沉天晚綠鬢朱顏那禁兩輪烏兔被恩枷愛繩纏住重如山深似海渾身擔負轉頭看只贏得一坵閑土些子時光白乾自招憂苦早抽身快尋出路水雲鄉閑笑傲開懷行步有玄珠待歸來向伊分付一毫不立萬緣俱遣露眞詮冲虚躡景泠然莫向他方物外别覓洞中天是韓獹逐塊陽焰爲泉亘初本源只這是更無玄默究端端的的體用完全分分朗朗放一段光明不記年還會得心月團圓古今擾擾大都奔競利名場舟車僕馬如狂到底功勳事業分付夢黃粱甚剛求失鹿不見亡羊且宜自防須著腳水雲鄕截斷從來去路步步清凉本然自得是千古圓明珠玉房眞箇事誰肯承當洞天物外自然眞境妙難傳羣眞宴賞留連鶴舞龍吟鳳嘯飛霧走雲煙擁霓旌月節羽蓋芝軿醉中論玄噴珠玉泝流泉笑指蓬萊清淺幾度變桑田眞容亘古縱劫火焚空無變遷誰解此紫府神仙此身有限利名無盡苦貪求人間事事何樓大抵百年光景贏得一荒坵似花梢晨露水面浮漚省時便休須勘破此形囚千古迷繩割斷跳出洪流逍遙坦蕩煉一粒神丹物外遊功行滿平步瀛洲天壤之間蕩蕩無拘束一二襟期資野服何處會心宜卜築萬壑松風一溪寒玉扃茅堂澹炷温鑪香味馥聽雅奏雲和塵外曲列岫窗分眞面目未到蓬瀛乃平生足覿面相逢一顧眼中人識會心冥處遙山寸碧洞天雲影磊落翠嵓蟠石芝英好在幾經秋色淺淺蓬瀛談笑間滄海易採眞攜手共遊天地一人間盡恁電轉風翻塵物玉峰高會莫通消息粗布寬袍製就開掩快不須綱紐虛豁襟懷籠通腋下舒縮恣容雙肘别無有卧蓋行披更兼宜眾中袖手似恁全身領受又何妨顧前盼後雅稱芒鞋偏宜藜杖出入送迎霞友有開口問斤兩何如便分明向伊抖擻不用衣衫楚楚隨縁化布帛絲縷選甚青黃從交橫順下手裏頭聯補見功處百片千條緊穿連著身堅固如意禦寒冒暑隨所在别無疑慮轉肘爬搔渾身輥圇一任不須囘護没人覷自在縱橫敢承當箇中作主平生懶散不識閑煩惱蝸舍但容身更誰問瑤臺瓊島比鄰縱有三兩野人家忘取舍絶將迎門外何曾到煙霞痼疾妙藥難除療只管放心閑未肯把靈源膠擾住行坐卧此外别無能眞箇事樂逍遙便是前程了眨眉瞬目說盡重玄理黃葉止啼休莫只待鋒鋒相抵玉關人老歸去罷論兵閑日月太平年村釀家家是橫擔拄杖唱箇哩囉哩豈羨廟堂榮更管甚泥中曳尾錦鱗自在騰躍禹門高收網罟撒絲綸不用垂鉤餌從來習性塵冗知多少省後急消磨動靜裏專專計較閑非閑是不掛一絲頭牢閉口緊降心人我先除掃住行坐卧莫把心王惱向上有機關更不許愚迷便曉積功累行慧眼忽然開芝草秀大丹成作箇仙無老蹉跎十載養就眞無賴事事不縈心更絶盡凡情世態將迎冷淡度日且閑閑翻著襪到穿衣一任人憎愛鑄就三尺龍泉快氣焰徹天庭又不見全牛可解踟蹰四顧不敢等閑看隨身帶密封緘地久天長在疑根未斷游魂不返多少閑情惹絆野雲溪水自由身與利鎖名韁許揀塵縁一判凡情盡遣卻悔收心已晩五雲深處醉蟠桃管不羨兒孫滿眼依山隱霧臨池影舞卻被文皮自誤豫章楠梓有何辜受斤斧傷殘無數惺惺不悟還同暮故身後虛名何處霎兒光景認爲眞盡忘了長生道路瓊分石碎珠離蚌壞文豹豐狐自害眾中誰肯密藏身但鼓髻爭頭要賣誇功卽退成名卽敗鏡裏朱顏不再到頭畢竟化爲塵枉棄卻玄珠寶貝玄珠無類眞容無對不許纖塵遮蓋年深團練轉分明要天府收藏没賽全身輕快渾無機械法網塵情俱解有人登壠欲商量此不許人間販賣天眞靈種華胥入夢趣取人間無用玄珠天府密封藏誓不敢紅塵賣弄魔軍齊鬨聲音迎送饒取威嚴尊重金毛披著上場來卻忘了如山不動妻男鐵鎖家縁猛火煎迫猖狂怎麽蠅頭蝸角有多來便捨命爭人競我執迷不趓甘心籠裹黑謎猜他不破只須閻老帖來勾待不得兒孫長大曲鈎魚鬧直鈎無釣今古分明知道世情看假盡成眞總不識先天至寶孤光圓照相忘同調物物俱休逆料本來一點上通天向姑射山中笑傲一團奸俏一團性氣動處欺天昧地傷他利己損生靈廣作業交誰代替冥司斷制如何迴避不許强辭抵諱頭皮換卻不如今受苦楚何時出離靈源春渚芝蘭藥圃發我歸心雩舞玉堂金室隱雲霞纔信及青霄有路瑤臺瓊島珠林琪樹香靄神風引步幾迴海上看桃花千歲裏花開一度閻閭聽誑天眞成妄俱喜攢頭裝相無名猛火步虛聲攛弄向𩓦𩓪床上無多利養做些模樣呈盡平生伎倆到頭畢竟意
