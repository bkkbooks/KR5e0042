seq: 3
front:
  text: 月依舊金花蘸碧波
  hash: sha256:bf9909cd7eb795107739b8bd965d9e035f95d0f4a8ce49e7d2390bb28c2785cf
body:
  text: 明明不是物了了亦非心浩浩通天地冥冥貫古今有無常顯化生滅妄浮沉神鬼莫能測聲聞何處尋骸骨生從地靈明稟自天六門陰鬼伏亘古谷神全性月光輝普心珠照應圓萬縁齊泯滅安穩到重玄翻身離世網著力斷迷繩不販何樓子誰懸傀儡棚好栽無影樹高點沒油燈滿室盡虛白客邪安敢馮白玉石中出黃金礦鍊成寸心離愛欲一性自圓明照破恒沙劫衝開納芥城輪迴從此出無滅亦無生天倪收委質化物舞强陽擾擾是非海區區名利場百年身頃刻千古夢悠揚向上忽透脫元神歸帝鄕是非無正定分量莫能期物理時時别光陰刻刻移蠅頭驅走骨蝸角鬧行屍塗抹漫千古無人解獻疑萬塵深坎窞兩耀急跳丸蠻觸勍蝸世槐檀役螘官忠誠悲玉璞狡獪泣珠盤幻惑無窮事浮生眼自瞞乾坤融大體俯仰一蘧廬萬曜高懸鑒羣生類數輿有無神變化消長氣吹噓未出洪鑪外那能遊太虛枯坐塵心滅忘言道味長不名蝸境界無夢螘封疆炕煖頻燒葉鑪温旋炷香夜深何限意明月滿虛堂坐穩蒲團力形温衲褐功拈香酬野客煮茗命山童將送情何懶喧囂耳似聾住山宜淡薄可愛底家風對客忘拈拂呼童倦擊鐘藥鑪餘燼在經卷積塵封不意收雞犬那論媾虎龍般般無伎倆留得一疎慵苔蘚侵新砌松陰亂古壇煮茶燃木葉撥火炷山檀璧月穿茅屋香風動藥欄灑然清況味同志莫盟寒丈室容眞境蘧廬映寶臺戸扃三界隱簾捲九天開擊玉雲軿集鳴金鶴馭催洞中人不老碧酒鎮相陪世事元無限人生自有倪不明樞始用終被物情迷獻笑防遮目臨危悔噬臍未然先薦得扶起上天梯解放虛舟纜疏開冷鐵枷罄身閑日用百衲舊生涯踽踽人間世飄飄象外家虹竿好收拾鈎餌飲雲霞懶慢傲林泉誰論佛與仙揮開韁鎖絆截斷葛藤纏不苟人間世忘懷物外天野雲溪月底逸興浩無邊在處要身安無如方寸間窮通時所係生滅命相關妙體陰陽外遺形天地間冥通造物者默轉是非環匪自王家得先承蔡氏頒工夫成甚易受用煖何慳掛壁雲歸岫蒙頭雪在山不求人世重宜伴此身閑卜築喜栽培功隨造化開蔬畦臨井側藥圃近墻偎次第榮桃李慇懃闢草萊不知人世事日用信優哉笓籬侵野甸莽蒼接虛堂秀木千章合清陰四面涼李繁堆樹熟瓜噴滿園香不必拈錢置田家自請嘗農家收百穀爽氣自西郊屢掃階前葉重添屋上茅霜陵紅錦樹寒促鬱金苞不見人牛在唯聞牧豎嘲重扉簾不捲炕煖紙窗明不問庭前柏忘懷雪裏英燃香凝霧色煮茗作風聲宴坐蒲團穩人間作麽生茅屋靜簫條庖丁不用刀山童禁狡獪野客命遊遨路細因人撥畦荒植杖薅都無塵世累眞樂自陶陶更闌戸不扃被褐谷神凝林際懸金鏡簷牙骨玉繩鑪中存活火窻下續清燈久坐形山歇和衣枕曲肱昧爽擊金鐘虛堂振祖風隨宜皆妙用或使盡神功寶鼎雲蟠結茅詹氣鬱蔥孜孜爲利者甯共此時同塵塵總破除㞐㞐復于于衲褐元相契蒲團舊所須封緘如意藏葆庇夜光珠逕入無何有今吾忘故吾策杖信心行忘機犬不驚疏籬蟲唧唧高樹鳥嚶嚶物順陰陽變人隨造化營草萊無盡藏蘭蕙可憐生穩密因時住無縁勝有縁少爲塵冗累不被利名牽昨日同今日來年似去年於羊渾棄意何蟻慕腥羶擁褐蒲團坐黃塵不到門黜聰非拱默忘我復吾存祖意何須錄玄虛且勿論本然祗這是安穩度朝昏熟讀南華旨機關會不難放開無限量收聚一團欒在用光塵雜歸源江海乾銅馳街上立無處問長安藜杖撥溪雲芒鞋踏山雪細採活人芝時飡延命屑松梢月正圓竹外風清絶此況不易知莫爲名利說一切俱莫辨得處休矜衒性命緊護持私邪勤煅煉冥冥幻物忘暠暠陽神現來去得自由不憂生死變人生貴適意心閑身自安草堂新坐具齋鉢舊綿單風掃庭除靜月臨窗戸寒沒絃琴掛壁清韻不須彈鼓橐靈風振何方不作鳴禺于通眾竅披拂動羣生遺響歸圓寂囘機忽變更向尋端的意張口豈容聲隱几非今昔神風發太虛有形皆鼓舞何物不吹噓妙體陰陽外聲傳造化初獨吹無孔笛清響徹華胥此箇怪形容從來灰槁同寫眞眞不得著假假何功困憊丹青手常居虛白中百年囘首處茅索繫春風要行卽行要坐卽坐歡時歌困時卧解語無舌人逍遙如此過高閣雲和不用彈免勞更覓松風和動若水靜如山坐通關戾默轉樞環有無俱混合聲色莫顢頇性了易命尤難陰陽莫測神鬼何干物物皆從化頭頭不放閑習習東風誰是主暗傳春色到人間全本無虧眞元不妄本全本眞一模兩樣開口落名言揚眉成影像主人拂袖便歸來還鄕曲調如何唱萬緣休處更何言向上機關沒口傳此外别求玄妙理大家總被葛藤纏一竅虛空八面玲瓏舒開寶藏敷演靈蹤若非吹掃纖雲力爭得寒光耀太空性天暫復和氣橫流非陰非陽無喜無憂更窮直上難言說高柳迎風笑點頭古老精靈馳騁神通縱橫自在變化無窮出入金石踢弄虛空乾坤輕觸百雜碎一喝髑髏三日聾威如虎勢如龍莫交撞入葛藤中加一毫卽多減一毫卽少清靜本然眞威嚴無做造法身充滿太虛空卻立一塵分徼妙識是何人心是何物取之有餘捨之不足頭上更安頭水母蝦爲目三徑歸來舊主人剪除藜藿栽松菊在耳能聽在口有辭抬手動足瞬目揚眉箇中人知不知由君驅使更何疑若將見處爲眞實卽墮傍門第二機性是主人形是宅遊卽爲魂止卽魄若將分别論玄機毫末有差天地隔照是誰照覺是誰覺鵠毒一生過模糊兩重錯此處透玄關二邊空索索䬃䬃西風度晚林一番紅葉瀟瀟落無道處疾囘轉有道處莫留戀虛空分付與虛空天眼龍睛不可見水是波波是水有體卽用有用卽體不卽不離非一非二其隱也身入毫芒其顯也光照天地同歸妙本自多歧密轉四時成一歲體無人用無我不卽不離能唱能和非法非非法無可無不可有無三際盡圓通立起一塵看活墮已往孤峯如瞽如聾未來孤峰水泄不通孤峰見在自西自東普天無不是何處更叅同巍巍千丈澄潭側倒蘸無根上下空一念起一念滅捨身授身何時是徹改頭換面不自知虛生浪死無休歇心若虛念自絶除根本無枝葉獨露堂堂眞箇人萬劫輪迴頓超越誰是無主人喚時開眼顧六戸放光明四門常擁護主是賓賓是主主人公休暮故月華亭下行枯木堂中住一朝脫卻臭皮衫三界十方唯獨步右一十八事答廉先生所問螮蝀臆中蟠龍蛇腕下走達則天下通窮則一身守默然默然緘口緘口好將萬里奮鵬心換作三山釣鼇手大道無形體若虛肯心於此著工夫雲收月出青霄上一段光明何處無靈空如橐靜無懷鼓動來來販骨骸截斷急流生死浪卻令灰滅効心齋一葉全明造化機毫芒鋒殺巧相宜莫言用盡陽和力來往東風自不知東塗西抹趁華虛何日囘程返故廬本是主人甘寄旅早來乘當莫踟蹰蹤跡竛竮倒大癡强分枝派許多疑本源浩蕩傳千古汨沒紅塵自不知碧落寥寥澹玉繩冷看孤月掛簷楹浮生正逐槐根螘攪擾華胥夢不成桃李融融次第芳紛紛蜂蝶趁餘香不知游戲眞三昧忙亂東風上下狂零落桃溪碎曉霞未容消息到山家長春洞裏無根樹不藉東風自放花千形萬狀各分殊病眼看成鬼一車撥盡死灰寒焰在拍天風浪任從渠已陳芻狗亂如麻幻惑行人病眼花截斷葛藤無事去一軒風月舊生涯鑽皮出羽閑生事洗垢求瘢錯用心勘破主人休歇去遠山秋水自高深向上玄關未易知襄城七聖亦生疑日新何必師童子拜謝歸來更是誰透脫希夷向上關亘初靈物坐虛閑閑中自得眞游戲夭閼渾無處處安通融一氣自如如無有相資混太虛撥轉玄關得眞息四生咸共入無餘剪除荆棘樹芝蘭固蒂靈苗子細看功滿白牛眠露地月明風裊主人閑大化不能拘束得聯芳唯許自由開一枝亘古新傳授馥郁香風遍九垓魔魅勦除無足跡縱橫馳騁大神通提綱振領閑呈似萬聖羣眞立下風掃盡纖塵萬籟沉停停寒色印天心舉頭卽見家家在無數空生指上尋篤耨旃檀莫與同温鑪活火煖融融劫前一瓣然新炷作麽垂瓜礙不通萬籟消沉夜未央無弦彈出韻琅琅子期不解輿人聽摸索銅盤作太陽雪刃輝輝勢倚天舉之無上直無前豈徒氣焰衝牛斗切碎虛空露帝先收拾菱花不記年晃然孤月下瑤天虛堂掛起驚神鬼瑩靜光明滿大千如意密封無盡藏夜光輝耀五明宮會逢知友親拈出萬道霞光射碧空洪渺玄虛作短檠非膏非炬放光明乾坤不許絲毫隔山鬼神姦敢放行人皆執我竟驅馳畢竟元無正是非大底眾中常默默自然彼此兩忘機浮生彈指一聲中擾擾膠膠自不通盡被此團藏穢物枉教愁殺主人公蝸角蠅頭著力趨眾中叢裏濫吹竽而今老大方知悔向日云爲祇是雛道到忘言抵死親是貧非病不須貧吉祥端的存虛白肯把眞風說與君無情不是傲當時收拾精神恐外馳今日放行方得力平生底事老來知聰明薦取未言前卽是元初妙不傳卻向箇中分變態下同幽壤上同天是非叢中無語句利名場上不經行人情世態非干己自在安閑過一生不羨食前方丈玉精粗飽後一般般朝三暮四從吾分贏得身心到處閑懶衣蓬鬢人驚駭錦服金冠自不甯一色平懷無異相不求人重不標行不作顛狂不縱心平懷本分道中尋寥天自有家家月莫問浮沉與淺深厯劫輪迴心自謾而今收作一團欒光明放出通廖廓不在他觀在自觀忻然有樂非眞樂樂極哀來爲有心莫若無心哀樂盡光明一道古猶今懶惰偷安未是閑前思後算兩相關祇教絶盡絲毫念不動巍巍若泰山得失循環不可爭平懷本分道中行仙凡一例俱休問記取元初作麽生身在玄門四十年醯雞衝破瓮中天縱橫自在寬如許蝸角蠅頭不直錢萬有浮沉水上漚化工不息販何樓癡童撥得閑拈弄瓦狗泥車打破休會得山舟密密移有心天地可逃之人中自有藏人處就路歸來更莫疑物情著莫寸心灰寒涕慵收口倦開知有不容人會得洞房深鎻白雲堆修行大抵要修心削盡塵縁萬慮沉露出亘初靈底物不須知覺不須尋修行心地要空虛刹刹塵塵總破除卻顯亘初眞面目亦無銷減亦無餘短長大約百年中擾擾勞生到底空向上好求眞箇事密傳薪火用無窮心靈漂泊委塵沙似向柴門掃落花措手不能收拾得隨風逐水不還家萬縁諸境擾心靈羃羃紅塵鏡面生匠手下功磨拭盡冷光徹底照人明長生豈論幻形骸數盡歸元土底埋唯有本眞誰會得古今無去亦無來輪迴生滅本因心念念遷流古到今磨滅成灰飛不動晃然孤月上瑤岑自有天眞莫外求幻塵土梗事俱休虛閑一片清凉地白璧黃金未足酬太平國裏太平人林下山間寄此身霞友相逢無可道百花啼鳥一般春坐中更作仰天噓唱出陽關會也無影草探竿俱放下大家依樣畫葫蘆滔滔白浪是非海滚滚黃塵名利場無奈戰蝸蠻觸氏不知身世兩微茫兩角蝸牛千古事一星石火百年身誰能眼孔車輪大見徹漫天滚滚塵拈枝摘葉漲波瀾浩蕩靈源總不干掛口壁間閑坐去大家酩酊到長安世網纔疏法網囚檢身羈首自綢繆牢關一桚俱零落杖屨西風笑點頭百衲雲披杖屨閑草堂聊復炷山檀客來問道無言說笑指虛空子細看不學寒猫伏鼠癡窗明炕煖衲重披客來相對如欺魄問著人間總不知雲映青山愜野心草茵盤石老松陰坐中更入無何有不管寥天日欲沉鑪中忘卻燒鉛汞門外從他長葛藤事事不堪閑度日盡交人笑百無能荒蕪三徑絶交遊窗戸凄凄冷似秋卻得可人眞況味略無塵事到心頭貪求深入利名場係縛勞心生愈傷棄重逐輕顛倒用合隄防處不隄防役役身心不自由百年風激水中漚虛生浪死無程限識破歸來便合休眨眉欲辨移新舊轉眼那知換古今現在未來俱不識問誰誰許問安心浮名浮利意何深用盡機關使破心但爲兒孫千載計不防骸骨土相侵目前滚滚蕩黃塵大化推移刻刻新生死窟中人不覺捨身唯與利名親僕馬車舟歷險艱區區名利兩相關細思本欲圖安穩卻使身心不暫閑或聞車從叩柴荆百衲旋披勉强迎自料無錢置村釀一甌春雪淡交情洞房無鎖未嘗扃碧落寥寥月滿庭千古雲和絃不續夜寒流水響泠泠蛻塵蛻法蛻諸縁不說丹成上九天妄自不存眞不立更無言說到重玄千差萬異莫能齊跳出拘虛到不知卻向箇中分變態堆山積嶽總無爲茅靡波流未出宗巫咸自失想無功長於上古先天地大振玄風處處同壽焰傳來不記年久湛人僞染諸縁諸緣削盡忘人僞亘古天眞依舊全自與雲山舊結緣煙霞占斷不拈錢溪邊石上閑遊戲不問人間不學仙天和無喜亦無憂石女明知笑點頭酬酢萬方閑日用本然之外更何求其二天籟形聲不可模羣生萬有自禺于一風總攝俱圓寂物盡人空見也無其三天門開闔莫能知正坐全無一念時萬有萬塵從此出落花飛絮自離披其四天光宇泰自分明射透閻浮破鐵城遍界疎通無擁塞山河大地坦然平其五天機消息有無間斡運乾坤萬象閑撥動亘初關戾子一時春色滿人寰其六天遊蒿目莫能窺捨故趨新刻刻移握掌開拳還過去活機無不墮今時其七天府無容無不容一毫包盡太虛空打開封鎖交君見笑倒厖眉祖老翁
