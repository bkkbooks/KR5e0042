front:
  text: 人我山高占一涯萬峰遮眼戟槎牙塵封古道無歸路煙鎖靈源不到家爭肯束心如縛虎祇須瞋目效鳴蛙一毫纔觸心兵發直得橫尸亂似麻
  hash: sha256:4c93a979e14313c189c9c6ef6cc85cb3422ed5bd7a55bc72d8afd920281dd63e
