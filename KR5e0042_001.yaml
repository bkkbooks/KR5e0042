front:
  text: 雲山集卷之一
  hash: sha256:2d8ba07c4ef98cb908069738a6276409d659b836d9dadf987c16de1678fd8625
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0042_HFL_001-001a, image: hfl/0783/0783-008.png}
body:
  text: 知常真人姬志真撰性賦輝前照後博古明今出為生而入為死靜乃性而動乃心窮浩劫之靈源幽深恍惚體無生之妙用隱顯浮沉當其未鑿混沌之前不動檀那之際示地文而冥會為定發天光而朝徹為慧蓋已超於幻境恍爾難名即自契於真常翛然無係故用有動靜語默即體非味色聲香縱之則蕩於遠邇收之則入於毫芒猶寒灰之重焰若枯株之再芳煉真實以成丹鬼神莫測搏虛空而作塊兵刃奚傷至如作止萬殊根源一共有以俏措拈弄者當機薦取有以淡薄安養者飮醇受用白牛之泯滅無迹寶塔之玲瓏沒縫壁間掛口不殊筋陡浪傳神棒裏翻身何異攧交拈作頌若乃物來斯照感而遂通印星斗於澄潭之底現胡漢於明鏡之中運樞環於妙用即流波之太沖繫片段之舒間山雲莫比瑩圓明而皎潔江月難同彼且不飮神瀵而妄恣七情不保天游而相攘六鑿輕錢踴劍之所似飄瓦虛舟之未若秪形器之所域背玄風之可託大施之門無擁塞普化驢鳴不言之教甚昭彰鴻蒙雀躍偉哉虎溪携手而同笑南郭仰天而獨噓叙學有九年成大妙印可有一宿證無餘蓋巨細洪纖頭頭至道飛潜動植色色真如詭說公孫辨强名於非馬多方惠施詰至樂於游魚咦刮野老之雙睛斷山童之一指參乎應唯而已貫回也坐忘而得使迷則精衛銜土以填滄海悟則罔象求珠而投赤水動手則差其一著開口則失之千里雖因行而掉臂無妨落筆盡塵垢而已矣心賦性本於道清生乃心聚根塵之淵藪領善惡之喉襟念念遷流往不停而今不止新新嗣續動斯顯而寂斯沉當其非有非無為想為識出則麗事而著物動則隨聲而逐色捨之不可去取之不可得立總羣魔之帥浩劫常然坐為三業之魁無時自克若乃塵慮靜盡神明晏居光發寒灰之焰祥生特室之虛隱大無外藏微有餘脫盡簾纖到不知而若近承當穩密隨所用以皆如至於撥火然香烹茶掃地信手拈來者物物相應隨身放下者頭頭皆是江河淮海勢雖異而水無殊叉釧瓶盤用有差而金不二若乃隨宜變態逐境生緣其靜也凝而地其動也懸而天應於足則移步盤膝應於手則握掌成拳作止抬拈據獨化無形之主見聞知覺占當機用事之先若夫超越乎十地三乘籠絡乎五行四象在中立而不倚能內保而不蕩暫矜向上之消息即墮今時之伎癢洙泗宗風何所在入室升堂漆園妙處若為將推門放杖偉哉一竅虛通八面玲瓏珠璨玄虛之上丹圓寶鼎之中混乾坤為一體奪造化與同功無象無私若春陽之及物不留不礙如秋月之行空嘻順事而安者就路還家因物而用者隨流得妙大量江海兮無所不納高懸日月兮何方不照物我一域有無同徼斯乃五常百行之樞機萬聖羣真之總要七言古調長篇悟空兹生浩劫何癡迷引延若藕蟠青泥安知造物故相戲壑舟夜半移東西攻心利欲黃門劇目眩空花認為實風刀劫火自天來煽赫崑山焚玉石俗緣一掃盡成空及蒙大宥開牢籠始信黃糧未炊熟忽驚鍾遞樓頭風放眼才知夢中惡細想從前事渾錯皇天賜我好因緣跳出塵凡得真樂人間到了空無依爭如撥轉重玄機功成卸却娘生襖五雲宫闕乘風歸證怪惑道人遊戲真三昧變化神通如狡獪淵默雷聲震九天尸居日照周沙界金雞報曉泥牛走枯木龍吟頑石吼玉女吹簫作鳳鳴木人應節翻筋陡毫芒消息天關機拍塞虛空無盡期非有非無不可測或逆或順那能知大妙九年必期進造塗七聖迷所之推問放杖會未得眨眉弄眼空相窺證夢惑昔聞穆滿遊玄宫清都絳闕雲屯空更移向上或驚悸天風吹落歸樊籠又聞黃帝華胥國飛步履虛如履實雲霞徹視山谷平仍似燔林壁中出神遊夢及未離方乘風遊月非其常一超直入崑崙頂本然固有誰承當塵世悠悠夢顛覆真妄顢頇訟爭鹿槐枝勳業鬧蚍蜉蝸角功名戰蠻觸覺兮夢兮俱鴻蒙我今寐寤猶同宗借問主人開眼未一聲風送樓頭鍾招隱君不見邯鄲枕中得如意磨鏡未明人换世又不見槐安官裏尚金枝蟻戰功名黍一炊遍界盡為開眼夢化工幻惑間般弄似寄懸絲傀儡棚寧許暫如山不動智也無涯生有涯悠悠千古未還家家園素有知何在誰趁東風賞覺花歸去來宜早早步步清凉除熱惱頃刻光陰下手遲莫待形容變枯槁偶成人間萬事輕浮雲消長起滅隨時新或吹繁華變霜曉或吹枯槁回陽春孰能肝腸如鐵石誰能眼孔如車輪盡情冗冗逐虛幻頃刻一窖同埃塵何如進及真中真掃除萬慮清吾神丹成跨鶴獨歸去天地雖老存兹身郭子淵之汴索詩余生懶癖居林泉茅茨窘窶孰可憐一無所堪百不用擁腫鞅掌圖安然上人垂教莫敢侮秖恐節外生因緣咄嗟贅形實大患出門未許披寒暄先生約我欲南去自信方物那能圓鳧舄不飛風莫御兩足怕舉愁胝胼臨行惜别要詩句空洞此腹無雲煙溪藤落筆失真素墨池點破非重玄堊墁好在運斤手不期緩急新輪扁殷勤書此激嵓電笑擲瓦礫搖吟鞭與杜教授母慶八十康寧富壽人間優期頤耄耋希等侔長松鬱鬱貞石固玄鶴孤立靈龜游有數有形寄澤壑化工夜半移山丘何如麻姑相與儔坐斷黃龜幾出頭珠玕列植繞瓊屋山谷不躓雲霞遊交梨火棗日厭飫玉芝石髓尋常羞芥城拂石不可計幾回清淺蓬萊洲祝真常真人壽簷楹佳氣鬱葱葱東皇戒旦驅融風蓂飛四葉應真造九光霞映蓬萊宫霓旌月節捧麟馭丕顯玄風大宗主世間甲子才一周銅狄摩挲閲今古金堂玉室本無塵瑶林琪樹輕莊椿壽光寂照通理窟樞環圓應休天鈞清都永錫春難老拂石芥城何足道命蒂栽培高厚先無窮豈與人求禱特拈心炷香非煙冀伸愚懇猶瞻天歌以長言薦雲几朱顔歷劫常依然西嵒老靜廬中或生笋長數尺索詩歲寒蟄窟藏豐隆鬱結盤桓懷道沖乘時順動莫可待自春徂夏黃埃中欲伸不伸化成物蟠根錯節遲天工荒叢雜沓不足賴卓爾突出西嵒宫抽萌脫籜清且徑分枝布葉張其雄先生有道求入室倚門化作青衣童未容香嚴透消息妙傳得自懸壺公虛心內藴縮地脉頃刻萬里猶乘風保護龍孫無少損琅玕莫比纖塵蒙異日功成藉斯力信步六合遊無窮馮權教慶誕以壽山為祝渾淪未判包乾坤有無巨細悉固存元始虛皇建中極天柱卓爾名崑崙其上無蓋總天目其下無底擎地軸宫殿盤鬱山之巔璇璣運轉山之腹挺拔巉巖羣玉峰直超象外無爭雄大藐姑射與太華下視培塿輕喬嵩神人肌膚瑩冰雪心若淵泉與日月劫塵滄海任更遷不古不今無耄耋但願老仙如此山長春永不凋朱顔蠢爾具瞻履綦下悉開聾瞽通玄關跋非時桃花物理榮枯自有時差時逆俗心自疑此桃開花固非正韜藏結實無人知霜淩卉木百草死卓然獨顯天生姿道人愛此異凡格連枝折示誇奇特可憐此種非蟠根移向長春洞中植開花結子三千年珍味閭浮少人得寄路才卿造物弄人如弄丸無端幻惑巧相謾憶昔癸未二三月搖蕩故園戈戟寒漏誅殘喘各逃散千里區區行路難此命此身寄復寄先生玉庇均平安何當六月政暑雨驚報此晋摧神姦吳兒路滑豺虎斃泫氏風情雲水間邇來車軔朝暮發必料故鄉衣錦還歸心繚繞西南道行色依稀上下山野夫政坐迷惘疾忍附驥尾那能攀五言古調長篇勉世人生約百歲倏忽如彈指俱為造物戲擾攘不得已遑遑朝抵暮切切憂與喜干己盡成空況復非干己無窮分外事逆順相汝尓惡念等山丘良心無一唯閭家老子來頃刻不可止勸君且莫癡歸計求依倚跳出業火坑不作舊行履撥轉又玄關長生從此始寄道友論伯瑜昔在紫峰下雲霞相對披危亭接軟語朝夕心忘疲西風豁塵襟杖屨相追隨悽悽别鎮陽目送行遲遲臨歧約鶴山乘流不可知勢如羊角戾動有染絲悲西南雲水窟坐使心旌馳逆順乃天理行止非人為彼意直如繩此心圓似規千里共明月罔間毫與釐飛神相來往恍惚無預期同遊天地一寧許斯須離躡景並淩虛飄飄奚復疑從此三真會時時承芝眉住院住人不住院寧論物成敗住院不住人何殊俗杻械友雲及飛觀熟視同草芥彌費汗血力數窮終至壞何如真箇人誦一言一話朝夕飮瓊露默默得神解飄飄出六塵徑徢超三界亘初明月珠肯向人間賣我來略住院不責寬與隘但覓雲霞友似缺多生債安心處嘈雜名利非罥罣天賦性寒凛坐致俗睚眦趑趄良獨難傲睨吁可怪患此重玄病膏肓爭得差未肯自束縛何能呈狡獪祥風吹神襟杖屨輕且快南北與東西飄飄學行邁幽居幽居愜野情生事未嘗理交朋幾離合童稚相汝爾連墻如有敵經歲不相齒世態冷於冰人情淡如水鶉衣密補祝藿食忘甘旨疏散百無縈自得而已矣形幻有身致大患忘我復何憂形骸最親切畢竟成土丘況兹身外物無物非何樓大塊勞以生冗冗不自由萬事素已定誰能分外求疑團自粉碎休休復休休莫為空幻具還作真箇囚廓然自心安宜與化同遊於生無一為姑置不復留穎脫出塵坌表裏絶綢繆亘古性月在輝輝天霽秋世僞閉户懶出門衆議失和暢策杖走街衢冷眼憎流蕩合境責紕繆絶交嗔矯誑緬相作人難動止皆招謗自究心未灰莠然真作妄灰心復忘形誰驚魔與障紛紛人世間非是無定相各自立偏見同己聲相向大地盡紅塵從交翻白浪重玄得品味頓悟通真況自性孤月圓襟懷天一樣跳出死生關透入光明藏出觀我初學守愚渾淪無璺罅久靜復思動多口相誇詫臭肉候來蠅行貨非待價數數致窮屈鼓舞不得暇未能無汝保相孰莫非詐幽鳥仰投籠白駒驅就駕禹步及雲集俱為化所化世俗喜驚駭閻閭聽誑𧪹清淨輔真實豈願人咨訝搏空鵷雛飛寧知老鴟嚇萬塵付一笑取次得休假明明向上事彼各不相藉徑入無何有受用如倒蔗末後竟何如天下藏天下法身重玄妙法身物我皆具備微塵拆世界大量包天地巨細億萬殊根源同一致譬如溟渤中鱗甲同沾利悲哉墮有情復為形所纍淹沉生死窟輸轉皮毛類降本迷浩劫苦楚如倒置賢聖垂方便救援無遺棄奈何聰不明相對如夢寐壺天壺天接人境絶點純清凉殿閣倚空碧氣象連山蒼薰風自南來頓遣祝融藏蒙莊及辨惠揮塵談冰霜更上臨𣺈樓俯瞰湲流長野鶴各自適高柳搖晴光主人有好懷不酌鵝兒黃特製勝玉屑為我搜枯腸緣慮破纖悉徑及無何鄉至樂美四并受用烏可量誰問東華主軟紅塵土香跋董節副黃糧夢手卷晝為開眼夢夜作夢中夢眼開吻合俱冥蒙生滅廢興間戲弄為蝶為周不自知眨眉舉目端為誰邯鄲邸中獲如意蓋世功名黍一炊塵世光陰遽如許織烏匆匆經旦暮情知萬事徹底空大化忙忙幾人悟乃公獨得重玄機放眼分明覺夢非未肯瞞頇訟爭鹿五雲宫闕早時歸吊無欲真人隴右老仙公壽歷先天永慈念落人間臨目閲塵境八十有六年迅如彈指頃思復白雲鄉棄却丹砂井幻出彩雲容沉冥黃鵠影徑入寥天一少焉猶鏡靜寶珠無遺響衆瞻俱莫省虛堂夜未央月掛松梢冷世事萬形寄寥廓動止高厚并化機隨用撥物理逐時更交臂今成古轉頭枯與榮無情翻變態著力戲浮生提掇鴻蒙子施張傀儡棚交唆童作劇攛弄蟻興兵虛幻一團物悲歡百種情死生車轉轂劫運芥填城自作無門獄甘沉業火坑轉流無暫歇苦楚沒前程大悟如求免翻身道上行莫於他處覓心地早填平寄路才卿君今能著鞭我獨瞪若後來秋積雨霽凉風吹宇宙行李青草鞋杖藜隨在手去去不計程日用隨所有西山佳處約平分未必二兄真許否癸丑春送樊道録赴闕識面不數月軟語接猶希無何復相别緩轡策輕肥朔方晚春色楊柳自依依聯翩西北往暗塵隨馬飛去天不盈尺作霖心莫違舉首一明月萬家同是輝老我寄泉石俟君衣錦歸七言律詩讚道浩蕩神光徹太虛主張高厚定元初大包宇宙極無外細入毫芒光有餘萬象斡旋通造化羣生出沒賴吹噓物情不許通消息動植飛潜各自如慶長春霧捲千山萬里晴壺天春滿氣盈盈花心露滴無塵慮柳眼風開不世情稚子執迷遊廣莫老仙高會約蓬瀛坐傾碧酒歡無極醉裏雲車倒載行乞紙被此形端似護懸疣勘破元真事事休任唤馬牛皆不應從交雞犬不知求一瓢糊口生涯足百衲沿身歲計周更向侯門乞紙被夜寒蝸舍坐蒙頭頃年欲作紙被今幸成之柔綿細疊軟溪藤自製青綾一樣新畫捲野雲飛不動夜披江月照無垠相宜質素功非俗别得陽和暖似春老去癃鍾資火力矮床枯几伴間身省迷粹淳一散成澆漓悠悠弱喪迷所之視聽食息作者誰流連不返徒自疲隋珠彈雀癡所用取者愈輕索者重幾時勘破人牛非白雲是躡帝鄉歸又儲金畜帛自遺咎櫟社散樗那有灾玉通潤色碎珉石珠出夜光刳蚌胎藏身不厭在深眇外物已知真儻來直此報渠難自信又玄關楗豈能開倦住持出家移入道人家换上清虛冷鐵枷既悟幻緣非實相何堪病目認空花胥疏不及南山豹跨跱真成坎井蛙好藉十年間杖屨水雲遊歷興無涯郭子淵北行索詩時在通州此别燕山第一程潞川冰雪送君行道人簡事為繁事對客無情似有情跧穴但宜容蟄物搏風從此奮鵬程神遊八極無窮盡未卜何時會玉京瑞雪大地纖毫色色空寥天望極一鴻濛夜凝冷浸梅魂月朝拂輕回縞帶風身世密移塵境外乾坤收入玉壺中虛堂瑞草瓊林合壓盡蓬萊第一峯打睡放倒形山睫已交耳邊塵冗任喧囂杳冥忘記先生責齁䶎寧知弟子嘲何礙夢魚遊澤國不妨為蝶戲花梢惺惺一點蘧然覺遍界縱橫無不包中秋塵世無能解所憂相邀携手上南樓道人午夜亦何樂清坐仰天冥內遊乾坤表裏忽瑩徹大千沙界纖毫收廓然物我忘所在真境真歡無盡頭月韜光萬籟沉沉秋氣豪游雲薄薄天彌高庾樓袁渚不成賞倚棹停杯空望勞月本圓明自如故逢時掩靄光宜韜人生真為物逆旅憂喜去來無所逃覺夢而今說者夜來夢夜來夢者而今說說者夢者莫非吾如何覺夢生分别為周為蝶物之化若為抽釘與拔楔一念回機覺夢空靈明透出塵沙劫希遇萬世一遇同旦暮千里有賢如比肩兩曜匆匆駒過隙羣生冗冗絮漫天識情暫與雲泥隔念慮才分物我纏今古是非俱倒置夢中誰暇救頭然獨坐夢回周蝶兩誰分跨鶴腰金各勿論耐久兩鄰松與石虛明益友月兼雲鳥鳴風度張天籟山色溪光示地文真境灑然塵事外不勞重訪白元君失己道人所住無所住大用全機任逢遇有心覿面不相逢失己亡行言意路楚些招魂魂未歸利名終莫近離披微陽浮滚如麻粟徒趁口鼓非實機自照靈風鼓橐應何常返照家家盡葆光絶相巖前豐瑞草不萌枝上賸真香交梨火棗非他物威鳳仁麟自致祥金籥玉匙開放得水雲依約水雲鄉空代蠻觸未知蝸縮出槐壇空遣蟻交侵山河尓汝虛興廢日月東西自古今得失不停翻復手是非無定愛憎心誰能眼孔車輪大一見空華盡陸沉心迷夢幻境中朝復暮利名場上是兼非紛紛乃致太多事冗冗胡為寧不歸眉斧有情嗟自伐鼻斤無質為誰揮幾時攻許愁城破撥轉重玄向上機初任長春觀而今壓盡范萊蕪釜破厨空甑亦無敦杖蹙頤觀寂寞入門掩口笑盧胡安排冷淡為生計指點虛無是所需不掛一毫間打坐更於何處覓衣珠舊隱野懷唯憶玩林坰杖屨時時踏軟青眼界寬舒無物隔耳根清淨絶塵聽繞籬花木新粧靚脫粟虀鹽舊典刑盡日經年無箇事也勝鵬運上青冥迎將器小何堪濁以清人情推挽强披承正行自與錢神背枯坐從教窮鬼憑將送豈能甘若醴往來多責冷於冰請君點檢元常住無恙庵西老葛藤世情啼鳥芳花總屬春箇中色色盡通神蛸翹蠢蠕隨時變雀鴿鷹鳩逐化新世態紛紛俱倒置物情滚滚謾橫陳塵埃漠漠迷朝市但見黃金不見人訪友鐵石肝腸傀儡身赤心青眼訪同人運斤去堊難為質削鐻全天未即真人事執迷妖幻惑世情般弄鬼精神相逢妙處無言說白首仍須自斫輪同前試奏鸞刀學解牛世情推挽逆懸流明知幸脫塵樊纍爭肯甘為土木囚遺劍刻舟流已遠揭竿臨海父難求舉心一一成顛倒勘破緣空萬事休遺言識解誇張未肯藏半生真似鬧蜂房文魔攪擾心旌亂伎癢教唆舌本狂不審覆蕉誰得鹿明知挾策亦忘羊咄哉多口成何事打破疑團效括囊緘口幸脫塵樊俗網羅可憐還著聖賢魔紛紛未遣心中物浩浩空翻紙上波既悟却同三懡㦬乃知猶有一無何從今卷舌宜緘口保氣全神養太和著假革囊兩腳走西東誰向空中作主公驅遣百骸通九竅橫生六鬼長三蟲一團骨肉從頭幻萬種機關徹底空縱有本然真箇在丁寧說著耳如聾化機化機刻刻變從新蠻觸閻浮夢裏身罕見混融生死友倦聞嘈雜利名人華陽不遇間歸獸齊代空差老斫輪幻世幻身同幻惑但能虛妄不能真襲明傳薪續焰要重明伏火丹爐冷似冰覺海夜來新月滿性天時復瑞雲興壺中不種間花草物外元無老葛藤至理本從真實得莫教心口不相應修行修行何處最相親清淨無為達本真妙理亘初元具足幻塵消盡復渾淪靈根秀發隨時現大用全彰逐日新若向一邊求所得到頭虛妄不關身洗心心田荆棘剪除平火棗交梨二樹生靈物本然無少剩空花銷落自分明若珠若鑒圓而靜如玉如冰潔又清莫道又玄傳不得活機時復向人呈無爭羣魔束首罷心兵萬户千門賀太平良夜雲收兼月白聖時海晏及河清全勝夢到華胥國不論時拘芥子城清淨本然無變壞寶珠含攝大光明雲山集卷之一
