front:
  text: 雲山集卷之二兄二
  hash: sha256:d110c849107e2825df6b7e24b93a0fb55c5c21b0e9c84fb9945c0f240a03ba4d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0042_HFL_002-001a, image: hfl/0783/0783-053.png}
body:
  text: 知常真人姬志真撰好爭人我山高占一涯萬峰遮眼戟槎牙塵封古道無歸路煙鎖靈源不到家爭肯束心如縛虎秖須瞋目效鳴蛙一毫才觸心兵發直得橫尸亂似麻隨流沿流端坐泛星槎悟徹靈源却是家經卷詩囊間戲具藥爐丹鼎老生涯清溪道士邀明月白石先生卧翠霞相對兩忘三益友一篇秋水一杯茶居山盤石巍巍權寶座柔莎冗冗代青氈雲巖月竇排幽勝風伯山靈助法筵溪水茂林俱演道野花飛鳥盡通玄須臾徑及無何有不待言傳總是仙合俗誰家雞犬放知求一片頑心不肯收耳目鎮為聲色役形骸常作利名囚向從薪者爭分鹿懶逐庖丁學解牛顛倒是非無暫息轉輪生滅幾時休參玄嚼破重玄色色真金花出水淨無塵壺天風物時時别洞府雲霞刻刻新應化因緣俱幻相亘初消息自通神叢林草木無分别自是人中真箇人迷家弱喪淪流路轉差竛竮千古不還家檀槐身世同行蟻蠻觸閻浮等戰蝸聲色纏綿濃似蜜是非翻攪亂如麻誰能自立衝天志跳出迷津上月槎獨行印破玄玄得縱收須眉毫末盡天遊忘懷物外求雞犬恆服從人唤馬牛有質揮斤無犯鼻無情墮甑不回頭寥寥月白風清夜江海飄飄一葉舟味真清淨無為體妙玄一毫才起污心田伸眉頃刻生多事啓口分明落二邊有底坐同株塊纍幾多空被葛藤纏聚頭作相干何事勘破般般不直錢形昧元初撲入此形囚冗冗勞生不暫休般弄骨骸呈伎倆簸揚塵土販何樓是非叢裏爭開口人我山前競出頭只待鼻綿吹不動髑髏寧怗卧荒丘勞生附贅懸疣大患身從初特特認為真貧窮急迫無由歇富貴經營不暫伸名利場中添氣力私邪路上長精神到頭畢竟成何物苦你當機戲弄人邪見犗餌鯤鯨未見招迎吞比比盡陽喬浮萍點水甘流蕩落絮因風易動搖眼病只看真作偽心顛番想善為妖執迷固久難回换更有歸來助長苗實德才生一念鬼神知元本良心不可欺濟物利生忘取捨從人屈己事謙卑私邪偏亢尋常撥忠孝仁慈上下移恭謹至誠無諂曲人天何處不相宜塵緣交辨東西别有功此心難與世情同瓊漿淡靜無知味濁酒喧呼自作叢鮓甕乍開蠅滿側虛舟間纜水連空蕙蘭不愠無人見依舊清香拂晚風自藏事事俱休一味癡至誠唯與道相宜玄珠寶藏封須密瑶蘂瓊花發較遲丹藥煉成人莫識神符飛處鬼難窺法身混合虛空界妙用分明更不疑像法立像明真便失真朦朧昏眼更添塵丹青自此遮玄藏土木何年露法身幻出因緣徒誑世橫生機巧暗繩人謾神談鬼彌天過不畏閻家老子嗔教網入門戴上鐵籠頭牽去牽來不自由鉗束只依吾教誡封緘不許外參求天堂妄想媒求福地獄虛聲談作憂久久薰成倡鬼例妖邪惑魅死時休趨時侯門似海我如魚懸箔高門一一趨口自囁嚅心局促身將擎跽足趑趄道尊德貴斯為妄俗網塵情自是拘元本棄家圖箇甚思量渾錯用工夫俗念茫茫苦海浩無邊冗冗凡情總倒顛真偽顢頇無所辨是非淆亂孰能詮傾城共認狂為聖滿地唯看正作偏舉愛便宜爭敢逆何年栽活火中蓮心亂貧窮叨濫富驕淫無足勞勞分外尋觸處施張行迹偽動中搜索計謀深不生公正仁慈念但蓄私邪利欲心積惡貫盈無可逭非災橫禍一時侵妄作鑿破天真事事訛日增人偽不知多間神野鬼爭呈幻走骨行尸自作魔利己害他常設險貪生競物謾張羅隨身惡孽空擔負果報臨身奈若何看經書通書也勝不通書及至通書可笑渠只向口頭間咀嚼幾曾心上自躊蹰是非人我旋增長利欲私邪肯破除向上一機明不得之乎者也竟何如黜聰明非破聰明總作愚聰明唯恐自糊塗文華秀麗知而得清淨圓明會也無多在舌尖呈伎倆少能心地用功夫何時宇泰天光發始信虛間即道樞凡俗慳貪嫉妬愛便宜不顧危亡事事為數盡勢窮無證據災生禍作莫榰持呼神唤鬼師巫跳呪律書符善友醫香火旋燒才欲善閻家老子肯相隨心醉道人得味飮靈泉豈恃黃湯醉裏顛非殢六經窮奧旨特宜三要會重玄名鈎出沒魚吞餌利引東西蟻慕羶酩酊萬緣俱不問卧看孤月上瑶天赤窮聰明黜盡性天虛浩劫塵情一一刳從此渾身赤骨立肯交幻境撅株拘牧牛不見人何在置地全空錐也無窮到赤窮窮不得活機放出莫非吾從正從來結習縱貪婪膠擾心靈苦不堪正令乍行邪並遣真功微契道能參多生識寇知遊北歷劫迷方意指南世世生生啖黃糵乳糖才食便分甘實行從己先人謙又謙平懷本分自清廉利生接物仁無失契理明真義亦兼莫幻妖邪驚世俗休生詭異誑閭閻本行德業能深積向上機關不用拈真功休尋南嶽與天台名相虛頭盡咄回財色兩忘心地穩是非雙泯性天開真誠清靜行無間公正仁慈德備該外行內功俱有積亘容圓滿寶花臺劉輔之有女之戚造物無情相戲弄笑中不覺成悲慟司花幻出真可人醖造十年歡喜夢夢破俱空猶不慬盡心粧點傾城送聲銷線斷各還家活墮一場乾取哄化空造化相謾人不識變態神通誰委悉電轉機關不可防黯黯前程暗如漆翻掌存亡與消息朝四暮三顛倒七憂喜橫生沒奈何一團虛幻看成實風波風波易動懷恩怨結習難忘釀喜憂千古是非爭未歇一生人我競無休英雄自致功名縛豪傑尋為利欲囚大事因緣俱不問忙忙終日替人愁建化元真非相相非真建化門庭總屬塵塵裏孰能開正眼物中誰解露全身解粘釋縛無多子拔萃超羣有幾人自料本行非大器且宜清靜自頤神住院閭閻膠擾無休局人事將迎勞檢束徒輩擎擔冷鐵枷院門住守風流獄一毫失照心同俗聚塊拈來泥裏浴慚愧西風著力吹斷雲縹眇依巖谷論經羣經權作躡天梯黃葉拈來暫止啼過雨試看荷出水因風尤喜絮沾泥豈宜鼷鼠乘車馬未見鶢鶋樂鼓鼙下里巴歌殆成俗陽春唱出轉增疑自縛有生翻攪不知空戈戟槎牙塞滿胸非是海中窮徹底我人山上長奇峰迷繩自縛三千匝法網橫囚一萬重妄想欲超生死窟知他閻老肯相從法相莊嚴法相大施張一例亡羊穀與臧生死途中虛出沒名言路上謾商量然香撥火迎歸室擊鼓鳴鐘弄上場似此利名心未息如何能做法中王壇場聚頭作相巧相籠直得羣愚立下風弄假像真真作妄將無作有有何功指空畫空未必得依實主實還在中呈盡許多間伎倆化人不覺自盲聾未濟劫運消磨惡轉遷幾人曾結善因緣火坑炙熁身翻焰苦海瀰漫浪接天有底揭竿趨灌瀆幾多鳴棹泛漁船昔年任老今安在不見虹鈎犗餌懸悟真要解懸疣脫苦囊萬塵堆裏便回光多生積習重重撥歷劫私邪羡羡忘不挂一絲形裸裸丕承千古貌堂堂長春景界風光異玉樹瓊林次第芳甘貧蘧廬暫寄元非實何礙磬懸空四壁之子方能脫網羅乃心不肯甘沉溺積蘇纍塊亦何物拱璧兼金輕瓦礫幻化般般一筆勾分明露出真端的法身無位真人體若虛物來不已應斯須舒開寶藏乾坤窄放出圓光日月俱巨細洪纖同藴此有無高厚莫非吾茫茫沙界彌羅極頃刻收來黍米珠忘外具足莊嚴古道場活人芝草返魂香全提法界藏真境未放吾宗出葆光堯是桀非俱莫辨鶴長鳧短兩相忘太平無象家家遇拂袖歸來入醉鄉脫彀夢中了了醉中醒表裏仍存一味清事事拂餘真理足塵塵滌盡法身輕破瓢度日飢方覓營窟居冬暖後行不在世間圈繢裏自由間散過平生塵纍萬塵堆裏喜擎擔衣要尖新食要甘費用關心深計度向求如意引貪婪名纏自作投籠鳥利縛尋為作繭蠶分外間愁認為樂騰騰不覺一生憨疑網明知萬法本因心何更將心向外尋自有丹砂求自得誰為猿馬使誰擒神頭鬼面須臾革怪迹狂蹤倏忽沉大治洪罏未經煅楊灰終不見黃金尋山咄嗟性癖愛尋山及至山間却憶還俯仰坡陀艱負荷崎嶇磴節倦躋攀力熊飢虎時臨側獷獵備樵暮叩關爭似定心如玉立卓然隨處自安間遊仙人間信步登臨學采真公和遺躅鶴山鄰道鄉自屬雲霞侣地僻元無車馬塵石底靈泉寒浸月殿前古柏暗藏春草堂唤起山童問還有呼風長嘯人訪五巖五巖壁立列山顔洞府深沉積翠環華蓋彌羅縣玉室石門幽邃透玄關物經换世人何往人去朝元鶴未還雅操不聞遺迹在一天明月嘯臺間罷鈎白蘋紅蓼幾千秋鱍鱍金鱗不上鈎雲餌括囊徒自祕虹竿收拾便宜休離朱罔測還南望狂屈難言知北遊千丈洪濤滄海闊滿天明月一虛舟溫邦瑞壽日院宇朝來氣象佳暗添福壽在君家人間幻境他時識物外真風此日誇保命玉壺收絳雪延生金鼎煉丹砂肯來共飲玄洲上坐看蟠桃幾度花偶遇唤起昏昏瞌睡禪醯雞衝破甕中天無窮境界寬如許大解機關妙不傳臨水近山新事業好風明月舊因緣目前草木皆通理蟋蟀秋吟夜論玄自訟造物分明戲革囊區區猶著利名場晚年不禁多饒舌好肉間剜自作瘡益友逢迎漚聚散幻身行止夢悠揚世間搔擾難安穩却憶白雲深處藏重陽日遊瓊花島燕山重九約朋儔杖屨瓊花島上遊荒徑披𣘤穿古洞危崖倚石玩神洲蒼松古柏蕭森日紅葉黃花冷淡秋一事無懷幽興盡却尋歸路棹輕舟與金坡老餞行别話匆匆冰雪寒班如馬首望西山篋中符籙方傳授袖裏錕鋙肯放間真似去年離闕下復從今日到人間殷勤了却縈心事趁取東風欵帝關送張文叔之和林政尓天衢道大行日遲風暖馬蹄輕北遊玄水通消息橫列青山備送迎我亦冥搜窮鼠伎君宜著力奮鵬程和林咫尺天威近共企恩光下玉京同前年老情多惜别離不才剛作送行詩晝晴風度花飛日春暖泥融燕語時别後不禁重作惡望中無奈即成癡暮雲煙浪程程遠回首尋盟未可知送何巨川從真人赴闕鶴馺翩翩起自燕搏風直上約鈞天龍堆沙漠幾千里南海北遊經半年别後更誰供一笑坐中無與話重玄平生鐵石肝腸斷老眼相看涕欲懸同前君逢若士學盧敖一舉凌雲萬丈高往矣扣閽親帝座來斯署職列仙曹玄勳遠企通幽壤大庇餘波及老叨不濟世間無用物也宜林下醉蟠桃北宫懷古杖藜徐步覓宫庭大化潛移入杳冥草木别沾新雨露亭臺無復舊丹青瑶階滅裂余蹤迹玉陛摧殘在典刑水鳥不知人换世夕陽依舊聚沙汀秋遊瓊花島廣寒高處野花黃荆棘叢生古洞房亂石圮垣新境界敗荷衰草舊池塘雲浮冠蓋亦何在電轉山舟無處藏試向西風問消息倚天松柏自蒼蒼同前新秋仙子共尋盟風馭翩翩下太清百寶露沾窺月窟九光霞掩瞰蓬瀛俯觀碧落翻雲錦倒蘸瓊花映水晶飛步廣寒間點檢玉霄東畔幾人行憶故宫積木雲屯結建章長驅胥靡固金湯釀成蠻觸鯨吞力變作檀羅蟻戰場一夜宫闈餘燼末百年人物盡荒涼載思鼎沸繁華日誰信西風草不黃西華園輦輅蒙塵竟不回五雲樓閣盡成灰昔年大業光千丈此日虛名酒一杯造物機關同作劇織烏朝夕競相催御園花草還知否移得東風别處栽燕然感舊金源失鹿走中州不覺灰飛五鳳樓掖衛宫庭成草野衣冠人物盡沙丘鼓鼙驚破華胥夢雲水初期汗漫遊佇看西風小搖落白蘋紅蓼幾經秋悼郝講師憶昔漳川對語辰偉哉今已返其真羽衣擲地先除故鳧舄飛空别换新步斗夢回塵境暮躡雲歸去帝鄉春玉罏黃串融灰燼留著清香付後人宿五華山真仙重葺五華宫盤鬱山顔錦繡中落落清泉鳴靜夜瀟瀟瘦竹弄晴風地偏境絶排幽勝人力天成妙化工借問鍊丹何所在滿山喬木夕陽紅真性擬議形容已失真才經唇吻落根塵一源始發頭頭是六户分光刻刻新圓應樞環皆造妙撥回關捩自通神幻成僕隸知多少誰是元初舊主人客有錦囊貯鳳喙以示人才出丹山德已衰況存遺味憶毰毸羽儀五彩空傳爾靈質九苞安在哉大蔡刳形非自貴仁麟折足亦何來四靈不是尋常物也向人間趁劫灰同前活機傳得已忘年今見人天道兩全卓立吾宗超萬古圓融事理具三玄宏開寶藏無鉗楗密應樞環拂正偏挽轉銀河乾作屋瑞光揮霍鎮燕然送曳刺使赴闕垂髫恩荷帝王家補衮何妨驟及瓜穩穩絳霄騰禰鶚迢迢銀漢坐騫槎金甌異日名黃屋玉陛嘉時薦白麻咸仰吹噓回暖律一天春色遍河沙祝清和真人壽捧日開天下玉京玄門砥柱海山英三千甲子世間出九萬靈仙方外盟壽蒂永堅松化石年齡輕越芥填城真容浩劫常如此坐看黃流幾度清顔盞大師九月五曰壽素履麻姑金母儔偶乘風馭降中州蟠桃不吝東方朔火棗親傳許遠遊香靄雲和清特室玉芝瓊蘂宴神洲蓬萊清淺間談笑紅葉黃花幾度秋送賈講師之東平芰荷香裏送君行可掬歡容出鳳城暖日鬱蒸歸旆急薰風披拂羽衣輕驚回故國三年夢數盡征途十二程别後東西南北客幾時重遇話班荆和楊西菴韻洞府雲扃未啓關飄零紅雨覺春殘恰回巖谷吹噓力又作江天霰雪寒風送敗船投鬼國人隨行蟻到槐安從來造物兒童劇且置忘懷不足嘆同前冥搜天理徹離微世事紛紛易見機新浴振衣皆必取躁求操瑟亦貽譏抵時投隙邪干正忤物攖鱗是作非但得神襟建皇極用宜補衮捨宜歸送彭宗道從師北行此别何堪思鬱陶君逢若士學盧敖鶴先有意時常唳雲本無心勢轉高致遠不疑容展驥解牛何慮澤吹毛宗師藉爾鈎竿用健泛瀛洲釣巨鼇送崔庭玉赴闕竹月松風伴有年霏霏梅雨别燕然遠山得意間搜句沙漠無人更著鞭赤水早圖元事業青氈毋失舊家傳殷勤要及通明殿附鳳攀麟朝上天送趙子真送藏經于朝廷憶昔同遊金鳳臺臨高望遠思悠哉重來又作燕山别不意翻為驛馬催寶藏玄輝天上去塞塵秋色鬢邊來歸期已定終年約莫遣丹心一寸灰悼郭超然寶藏番謄總不真遺編斷簡即蒙塵驚回卓爾音容古夢破遽然氣象新浸假臂雞人境暮穩乘神馬帝鄉春鳴珂徑及通明殿不管關情淚濕巾送王大師赴闕補天親及翠華宫挽轉銀河别有功鶴報金書來紫府雲融彩色見蒼穹布揮惠澤沾枯朽搖蕩仁飈發蔽蒙瑞應合傳天上去坐觀鵬翼又搏風題遇仙宫活死人墓靈源痛飮解吾宗浩劫師真面目同醉眼忽開天地窄夢魂驚覺海山空輝輝金玉花爭發璨璨珠玕樹作叢借問終南千古意百川無語自朝東送潘提點之永樂仙公初出五明宫玉佩聲傳禦寇風三素雲蒸頭上白九還丹結臉邊紅大明通密先師意又繼純陽鼻祖功遐想中條山上月瑞光澄徹萬家同送李和甫歸秦之子西歸出鳳城芰荷風襲羽衣輕蘧廬天地寸心事咫尺雲山千里程幸矣相逢親識面惜哉重别淡交情終南祖意君偏得獨向長安道上行送杜天甫歸終南匆匆話别思悠揚邈邈雲山道路長心係祖庭忘酷暑行隨官柳趁微涼盛時著力須精進老我無心自退藏記取琳宫分袂日晚風輕拂藕花香吊馮權教文林戢迹效玄微回首人間覺夢非旦宅不留真面目作家元有活關機雙鳧絶迹白雲去短笛不聞黃鶴歸悽慘樓前舊花木西風和露泣朝暉送何巨川之祖庭空山落落水長流鶴怨猿啼歲幾周昨向壇前陪鷺序今遊秦隴占鼇頭馬前風月程程遠鴈底關河處處秋會得一綱張萬目活機輕撥早歸休紫峯老師南行乾坤徹視一蘧廬變動不居遊太虛觸物昏明承影似從人俯仰桔橰如洪津浩汗橫慈艇古道峥嶸運德車多少步趨瞪若從絶塵奔逸到華胥同前阿師先得箇中真紫蓋峰前舊主人呼吸一風號萬籟圓明孤月照通津北臨燕薊光塵混南渡梁園草木新到處不煩吹暖律從容寒谷為回春老子過關圖皓首童顔幻化身青牛薄軬踐黃塵月歌天竺溪山曉風度函關草木新跨古騰今乘日馭入無出有化飈輪欲窮妙處非名相不許丹青畫與人悼張文叔和林返真活火丹罏計已遲風雲間置不哦詩衝開八極神遊日勘破三生夢斷時楚些招魂聊復耳越吟思舊亦奚為空遺腐骨寒林下春去秋來塞鴈悲送左法師赴闕元放傳家幾代孫數年矩步謁金門才聞風旆離天闕又報星軺復帝閽分應王公希薊訓力呼神鬼效劉根燒山符在隨時用輔正除邪仰至尊餞趙法師赴闕驛程冰雪路賒長别語匆匆酒一觴篋貯羽符增氣熖匣藏神劍動光芒祓除氛祲從王事驅馺風雷及帝鄉佇看一吹山鬼伏搜畋無復見倣徨吊順天府賈左副政柄堅持觸化機斷雲飄忽帝鄉期枕中夢熟雞三唱槐裏功成黍一炊幻境厭離殊不惡故衣更换亦何悲請看圓缺金臺月照夜清光似舊時别李府判織烏不息走西東青鬢方曈豈易逢世夢短長俱幻化人情非是一鴻濛琪林特地黃塵外砥柱滔天白浪中出岫野雲飛不定任交隨雨又隨風于公大師挽詞阿師紫府謫仙儔畢竟終期汗漫遊心迹百千三昧了世緣七十一年休葉鳧飛去山銜月鄂笛聲遺黃鶴樓望極渺茫滄海闊斷雲飄忽鳳麟洲警世春去秋來不暫停兩輪催促太無情蝸牛角上爭名利石火星中寄死生閻老判勾難抵當酆都決去沒期程有條坦坦分明道爭奈迷人不肯行天網天網恢恢不可欺冥塗黯黯卒難知善因惡果因心造地獄天堂各自為餓鬼傍生貪裏得淹魂滯魄性中癡勸君絶早尋歸計限到臨頭悔後遲寄南宫舊友鼓笛聲中上戲場粧成模樣作趨蹌不知造物間般弄空使傍人話短長伎倆呈來乾懡㦬機關識破絶商量虛堂月白風清夜坐對溫爐一炷香同前自笑從來底許迷欲尋東海却投西怨恩爾汝何須説非是翻騰不可齊世味嚼開濃似蜜物情勘破醉如泥而今各得心無用月在青天水在溪跋真理融會堂滑昏靜盡即成純舉目圓融大法身交際不拘通理窟活機潛運即吾神百川汨汨朝東海萬曜煌煌拱北辰説與春風舊消息野花芳草一時新同前茅靡波流未出宗箇中寧許辨渠儂眉尖眼尾拈來是柳際花前觸處逢削去門墻無界隔打開關鎖不緘封虛堂靜坐人如玉風度筠梢月挂松跋坐忘圖乃公形似橛株拘坐斷遑遑轉徙塗倏忽有無同混沌乾坤俯仰一蘧廬忘懷健羡遼東鶴不肯輕飛葉縣鳧聚塊積塵休比擬寥天大地莫非吾誠齋誠意正心居此齋名師良友喜相陪庭前翠竹迎風立階下紅葵向日開曉樹不聞天籟靜夜窗分得月華來桐飛一葉還知否已布秋容遍九垓三山間適拙訥難分長上憂懶窩仍喜衲蒙頭厚陳坐褥䅌三尺易辨齋糧粥一甌晝起夜眠無箇事夏涼冬暖更何求杖藜時復生狂興走遍三山與十洲化工摶塊當空夢裏爭化工般遞太無情眼前薄利空花靨頭上虛名破鼓聲長短百年為際限有無千變沒期程到頭畢竟成何事空使形骸弄死生造物從來造物戲窮通攛弄浮生一夢中名利有無分變態是非人我競雌雄多生積習從頭假萬事消磨徹底空酩酊不知誰是主落花飛絮趁東風繼董德卿韻十年不識讀書帷料理真心與世違深笑夔蚿憐彼此冷看蠻觸竟纖微一天風月間儔侣千里雲山舊倚依行李少煩塵俗物破瓢藜杖著身衣憶三山時在燕京長春宫昔在梁園載笑歌採芝風韻氣峨峨方池曲沼景如許瘦竹疏梅清更多玄圃鼇頭心自解草堂龜背意如何唯餘夜夜三山月依舊金花蘸碧波雲山集卷之二
