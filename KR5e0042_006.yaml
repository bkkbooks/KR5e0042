front:
  text: 雲山集卷之六兄六
  hash: sha256:8df472200a48facddf51024f81dbea73ae77f2d138957189a3f7aa57035e3503
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0042_HFL_006-001a, image: hfl/0784/0784-055.png}
body:
  text: 知常真人姬志真撰太常引夜深凝寂月明堂曳縷返魂香物我兩相忘恍然在清微帝鄉眼前今古世間藏穀一例盡亡羊險處不隄防競奔走槐檀戰場其二滿山風物一溪雲猿鶴自為鄰絶盡軟紅塵向物外安排此身藥罏丹鼎鳳膏龍屑烹鍊玉華新遊宴景長春要承當方壺舊人其三幻塵擾擾夢魂飛著腳履危機省後自驚疑猛跳出樊籠制圍草鞋藜杖素冠蓬鬢蒻笠與蓑衣雲水任東西更管甚人間是非其四賢愚汲汲鬥經營唯是利和名渾似弄潮人與千丈風波競爭百年光景一堆塵土碌碌苦勞生回首問前程望極目山河未平其五紅塵白首尚羈縻忙亂趁多歧走骨鬥行尸問來往驅馳是誰一天風月一溪雲水此處好栖遲說與更生疑似掩耳偷鈴自欺其六人生弱喪自迷方來往恰如狂泥裏弄泥團竟不識神珠夜光幾多風雨幾回磨歲爭肯暫恛惶何處是家鄉便指與疑心怎忘其七化工幻出是非囊般遞利名場癡子競商量便迷却家園故鄉摧殘冰雪憂愁風雨幾度變炎凉一念果難忘受萬劫輪回自當其八非僧非俗不求仙茅屋兩三椽白石與清泉更誰問桃源洞天一罏香火一甌春雪澆灌淨三田間想谷神篇忽不覺松梢月圓其九道人活計要清虛不受利名拘囊橐一錢無似出水圓荷迸珠一瓢糊口衲衣遮體此外更何圖高枕及華胥向物外鈞天曳裾其十情知萬事轉頭空穎脫出樊籠飮啄且從容更不問三山五峰一丸丹藥一枝藜杖來往任西東隨處有雲朋盡出沒重玄道中鷓鴣天雲散風清雨後天新荷擎露碎珠圓清泉汨汩流塵外白石巖巖賴醉眠山色裏水聲邊留連風月話重玄溪童欲問人間事笑指漫空柳撒綿其二畫餅充餐必也虛刻舟求劍决然無癡心密數人遺契妄念重尋兔守株先聖迹古人書粃糠難作夜光珠萬緣拂盡方知道妙處那能說與渠其三翠翦紅裁滿故園無窮花木鬥爭妍東風不許常如此捨故趍新别有權花委地絮漫天纍纍青子葉含煙無情不逆機關弄坐看枝頭幾變遷其四暮落朝開木槿榮圓荷出水露珠傾火雲千丈燒空際汗雨淋漓倦鬱蒸虛白室誦黃庭灑然風度有餘清坐看造化間般弄熱惱浮生不暫停其五金菊疏籬擅化工草蟲切切話秋容荷衰蘋老蘆花白撩亂西風墜葉紅山减瘦水爭雄驅馳萬有盡歸宗道人亦喜三彭滅清夜無眠坐絳宫其六霜雪巖巖百物殘不禁長夜苦漫漫化工自促歸元命歲德回機養大還蟠地軸定天關玉封瓊島及三山真仙不管人間世幾見黃塵滄海乾其七門外黃塵點涴人山童不敢啓雲扃石壇清坐神遊北徑及無何接玉京香藹藹氣盈盈蟠蛟飛鳳會雲朋自傾碧酒重玄飲醉裏乘風下太清其八造物兒童作劇狂懸絲傀儡戲當場般神弄鬼翻騰用走骨行尸晝夜忙非是海利名鄉青蠅白蟻自相傷隨聲逐色誰敲點拍手歸來笑一場其九千匝迷繩不自由區區分外苦追求心中元本無煩惱鬧處先爭要出頭增我相替人愁功名未了鬢先秋莫防風激游絲斷撒手歸空萬事休其十事事無心恰到間黃塵閫外不相干機多著網因名縛無限吞鈎被口謾樊物外水雲間不勞辛苦運樞環藉莎白石和衣卧野鳥山猿相對看其十一弱喪飄流未肯歸玄關說與更增迷此行若遇商丘老𢬵却骷髏更不疑先犯早後遲遲箇中消息幾人知東風不解傳春信李白桃紅自滿枝其十二人僞開張日漸深等間不惜費光陰多方計較愁無限百慮摧殘苦不禁心事逼鬢霜侵功名寰海妄追尋發言布袋中盛蝟舉目人間但見金其十三自救狂心忘世情從交相責冷如冰人間會盡頭休點物外行來眼自明山寂寂水泠泠滿天明月淡疏星松風却似知音者夜夜招乎萬籟鳴其十四爭鹿人家夢未回眼前觸物盡塵埃古人蹤跡徒云耳宿世功名安在哉明月窟亂雲堆紛紛浪語總休該流霞一醉三千日莫管紅輪上下催其十五販骨來來幾萬生煎熬窟裏謾峥嶸百年不覺消疣贅千載無能息劓黥翻欲浪起心兵迷繩自縛聚愁城幾將濁水澆胸臆倒語顛言賀太平其十六過隙光陰抵死催浮生屈指有多來芥城業識填將滿拂石迷雲撥不開功打底罪爭魁英雄呈徹死堆灰一團虛幻間般弄有耳如聾唤不回其十七自悔間人合住山人間驅使不能間交朋力擁推離位鼓板聲催弄上竿無伎倆轉身難大家取笑有何安好心用處翻成惡暖氣呵人變作寒其十八太極玄虛若鏡清乾坤元是鏡中形人身影裏重生影物象名中復寄名空外物夢中評一團虛幻戲靈明有生不慧看成實夢裏分空著力爭臨江仙舉世紛紛爭富貴道人獨占清貧清貧柔弱得安身心間無事過隨分樂天真一點浩然如古鏡圓明不受微塵護持功滿自通神超淩三界外遊賞四時春其二歲月無情如電轉人生不耐消磨前程路險莫蹉跎火坑千丈裏踴出上高坡别覓清凉安穩處掃除平地風波不移一步到無何一枝無孔笛一曲太平歌其三我本世間無用物般般伎倆都忘十年冰雪坐虛堂人情牽挽動般弄不能藏却憶雲山尋僻地結茅小隱何妨竹軒松徑倍清凉月明千嶂外風動百花香其四醖釀長生天上酒人間此味誰知玉壺旋貯碧玻璃時時供小飲神彩更忘疲好會襟期方外友同餐火棗交梨幾回滄海變塵飛三山歸去日携手步雲霓其五自笑口頭間伎倆口頭畢竟非真早知拂却舌尖塵三緘常默默超出是非津屏盡千魔并萬難間中頓覺頤神好風明月自相親多生緣習斷印證本來人其六人我是非相戲弄渾如傀儡場中虛聲亂耳不知空强分胡與漢塗抹走西東識破固非真實事何殊拂面狂風與伊相對且雷同安身非取此承當主人翁萬年春夢到華胥半天宫闕塵凡表異香縹眇曳縷雲霞繞浩浩靈空不夜神光皎誰人曉與君知道永劫春難老其二生滅無情古今輪轉平如水急須隄備作箇前程計自有元初一點何曾離靈無比鍊成真體壽量齊天地其三雲海蓬萊瑶林瓊樹真仙種彩鸞金鳳來往相迎送說與人間不信成無用塵情重牛毛冗冗爭作槐根夢漁家傲拋却俗情韁鎖解般般放下身輕快絶盡塵情忘世態無人采本來一點常安泰處處唯求真自在誰能出貨圖人賣不是間神并鬼怪無相礙何勞盤果香煙賽其二伎倆全無癡懵懂紛華世事看如夢贏得一生心底空忘塵冗客來不管相迎送我自情疏誰與共愛間不願人欽重看罷南華無所用休相哄老來生怕間般弄感皇恩傳火付前薪花聯葉綴咽下頑涎弄神鬼戲臺子上抹土搽灰相繼是非名利裏虛生死谷董謾他葛藤自繫試看棚頭五田子聲銷線斷伎倆都無如此謾峥嶸不省誰驅使其二合浦未還珠空撈赤水蒿目蓬心兩何濟縱令垂手援溺孜孜為意奈洪波浩汗爭沉底槐裏圖勳枕中得意說與重玄淡無味木鵝休放三老歸來沉醉對晴波不用雲霞餌其三未始出吾宗波流變化欲假言傳又何暇平懷本分日用分明真假更何勞向外尋嬰姹八面玲瓏元無璺罅今古商量未嘗罷據梧枝策都付間中談話寶珠無盡藏誰酬價其四事事不追求隨緣且過欲作神仙妄心大瑞雲深處一拶牢關俱破更誰諳自有真真箇未及乘風相忘物我比著塵凡較輕可無絃品弄不若間行間坐恐知音又有松風和其五雲海接瀛洲鵬程浩渺换盡凡胎步方到神仙底事紫府丹臺幽杳縱分明指點人難曉藥圃芝田靈苗瑞草滿地香風遣誰掃洞天不夜月底行吟縹眇待知音付與玄中寶其六清淨本然真紅塵積染世網情枷競趍諂茫茫苦海鼓蕩洪濤瀲灧弄潮人不避風波險彼岸高登家園點檢千古離魂自招颭般般拂盡依舊元初一點夜光舒洞府雲霞斂其七一念失真常沉淪苦海六道周遊趁情愛形囚物彀顛倒何時懸解在人中分外貪婪差死去生來千形萬態宛轉循環要寧耐片時光景不測頭皮更改勸抽身莫待臨時悔其八雀躍拊髀行推門放杖齧缺支離未偎傍屠牛牧馬畫箇葫蘆依樣涉程途聖知生迷惘不識不知如何趣向狂屈才言又還忘百般呈似種種施為俱妄要承當的的天真相其九物外迥無塵壺天閭苑雲影虛簷自舒卷月魂冷浸不謝瓊花開展異香金篤耨通幽遠高會謫仙蟠桃置宴滿酌流霞浩歌勸噴珠咳玉走鳳蟠蛟酬獻指蓬瀛笑傲談清淺其十天地一蘧廬形骸寄旅彈指光陰遽如許眼前心上暗鬼空華無數盡勞生冗冗同囹圄塵境破除於中作主俯仰人間已今古忍將一點甘受名囚財虜訪林泉自在雲霞侣其十一事事飽諳知才尋易簡種種施為盡虛幻飯囊氣袋伎倆呈來羞赧夢魂驚覺後開青眼百不介懷蹉跎懶散法網塵緣莫推挽嵐光野色溪月松風何限放間身自在無拘漢其十二著腳軟紅塵心君懊惱占得時光有多少窮通利害得失存亡翻攪使機關見解何時了爭似去來巖阿靜悄平步瀛洲幾人到風林月嶂窗户雲霞縹眇任縱橫總是長安道青杏兒詠菊春夏競芬芳天憐此祕惜藏光紛華落盡方開展疏叢淺淡孤標冷落獨傲秋霜好在水雲鄉無人知見又何妨賞心希遇陶元亮新松相對金英依舊風逗天香其二秋色滿林紅霜風妬物物皆空榮枯頃刻如翻掌紛華識破疑根自斷躍出樊籠隨處得從容身輕快具足神通人間天上俱無纍乘風御氣飛騰自在南北西東其三人世太愚癡虛幻裏自作羈縻妻男眷戀何時盡同枝宿鳥天明解散各自東西走骨與行尸看不破傀儡關機一朝猛省方開眼迷繩割斷牢籠跳出也是便宜其四沙暖狎輕鷗從伊便唤馬呼牛樗材擁腫元無用臂雞時夜尻輪命駕江海虛舟無感亦無求拈出處茅靡波流頭頭相與吾之耳風清月白疏梅瘦竹都是天游其五一氣貫寥寥冥混裏孰謂鵬蜩千形萬狀隨空化乾坤運轉遊塵野馬都在扶搖曳屣挈簞瓢異玉食肥馬金鑣薰蕕梟鳳雖殊器天鈞一點靈明不昧各自逍遙武陵春造物化成虛境界人我是非叢蠻觸交侵各用功都在夢魂中勸飲一杯方外酒兩頰鎮長紅醉眼朦朧望碧空著莫辨西東其二山鳥唤人歸意重佳處有林泉茅屋經營三兩椽據分不拈錢萬壑風鳴千嶂月小有洞中天石上松間坐與眠何處覓神仙其三斷鼻芒鞋秋後扇不是背時行側卧香爐沒底鐺著甚更峥嶸此物只宜間處頓相見各無情莫怪淒然冷似冰安穩過平生其四幸遇真仙來海上丹藥肯長留亘古靈方祕藏收傳與列仙儔試貯金壺成醖釀一飲醉千秋海變桑田不舉頭冷眼視蜉蝣柳稍青人靜月明時節漸煮茗罏中火滅心宇灰寒古桐絲斷燼花凝結惺惺夢及華胥回表裏冰凝玉潔瑞氣沖融丹雲縹眇五明宫闕其二明徹口頭三昧拂迹便忘言守拙古道潜通先賢冥會太平時節長安陌上縱橫更不在拈花摘葉處處圓通頭頭皆是放開心月其三靈明本無圓缺先太易常存浩劫一受成形隨流忘返死生磨滅貪婪百種遭殃謾販骨如山未歇正眼開時元無一物頓然超越恣逍遙圖名圖利爭人競我開眼後一場懡㦬誰高誰下誰强誰弱閻老子一般籠裹事事俱休般般打破無拘管住行坐卧風前月下水邊巖左且由俺快活則箇其二野服黃冠芒鞋藜杖無拘係水雲來往行歌立舞玄談清唱也不論王侯高尚性月圓明神珠晃朗周沙界迥無遮障逍遙自在優游偃仰人間事任他勞攘其三昨日嬰孩今朝老大百年間電光石火筋聯骨肉皮毛纏裹酩子裏認來是我競氣忘形貪財引禍到頭待做箇什麼回頭認取本來真箇這疑團一時打破鳳棲梧造物謾人人不懂聲色場中傀儡間般弄今古廢興乾取哄須臾戲罷俱無用眼自不明真籠統走骨行尸逐勢相迎送强弱是非空冗冗虛生浪死輪回種其二過隙光陰相戲弄幻出浮生變滅如旋踵酩酊不知空日用恩枷愛鎖如山重錐刺不疼針刺痛性命顢頇外事多惶恐何日如輪開眼孔惺惺不作槐根夢一剪梅雲水鄉中即是家性耽丘壑志傲煙霞清虛已戰勝紛華世事從他擾擾如麻客至何妨不點茶相忘交結冷淡生涯坐中無物向人誇唯有延生一粒丹砂其二珠樹瑶林氣象嘉玉龍無力熟寢銀霞青童旋撥貯瓊花瑩徹冰壺一色無瑕寶鼎初溶火漸加濃烹團鳳極品黃芽塗金羔酒世情誇此況誰知物外仙家其三薄暮餘霞天際紅反關無俗指點山童新泉活火煮雲龍受用仙家兩腋清風千古埃霾雪山胸陰魔除掃不敢形容玉川携手水晶宫月裏行歌縹眇孤峰其四畏日炎炎氣鬱蒸枯禪頻起靜勝無能先春雪浪侵冬凝唤起玄冥滿坐寒生北帝威嚴正令行祝融退步酷沴潜形神通揮霍貫心靈乘此清風歸去蓬瀛其五是是非非橫口開顛顛倒倒百種乖崖仙凡何地可安排萬事無根空去空來一點靈明大矣哉茫茫今古空有全該巫咸休作杜權猜魔魅難窺寶鑒當臺西江月挾策亡羊莫問覆蕉失鹿休窮大家都在夢魂中夢裹重重作夢具足元亨貞利圓明微妙玄通眨眉目擊莫形容拈出般般妙用其二拍塞虛空無外包羅天地難窮大千沙界盡含容不是顢頇籠統狂屈欲言還忘季咸自愧無功試拈未始出吾宗驚破南枝午夢其三自性天中日月元真海裏舟航千門萬户為敷揚引入亡羊路上續焰傳薪莫會金壺碧酒先嘗博山一炷劫前香鼻觀難通妙況其四絶相縱橫妙用離形左右皆吾普天匝地盡如如罔象還同暮故宇泰天光內發室虛真宰常居沒功夫處用功夫穩駕神舟歸去其五不在拳頭指上何勞眼尾眉尖本來一點要安恬點綴絲毫即玷莫殢蒲團竹椅休耽象軸牙籤此心冥處貫洪纖妙用頭頭有驗其六巨細洪纖在在飛潜動植藝藝乾坤升降不停輪借問誰為轉運妙理周行獨立真君莫測冥存一針一草盡渾淪拈出虛空有璺其七浩浩彌天匝地冥冥貫石穿金千形萬狀內浮沉往古來今只恁摶塊當空未見遺珠罔象能尋無生一曲少知音唱出諸方口噤其八覺性從來具足天真本自完全浮生多被眼睛瞞並月空花繚亂八識元從孰起六根本是誰般豁然打破這疑團吾道分明一貫其九莫問丹砂鉛鼎休披虎繞龍蟠中間妙處自相謾業識忙忙不算六欲七情灰滅五行四象雲攢放行收聚一團欒赤水神珠炳焕其十物裏存亡有限人生光景無多不禁兩曜急銷磨枉恁爭人競我見解明如龜鏡從渠辨若懸河到頭無計避閭羅著甚支吾得過巫山一段雲寂照山銜月虛心出岫雲不留不礙賁天輪來往自通神誰向空中作主端坐放行收聚有無光曜遍乾坤真宰默然存其二法雨神山秀靈風瑞草香洞天無處不清凉日月景遐長玉珮金鐺搖曳飛步太虛遊戲五雲深處飮瓊漿沉醉太平鄉其三暖候飛灰律陽和入燒痕密傳春色滿乾坤枯朽鬥爭新妙用無私無象雕刻萬行千狀不言品物自藝藝何必問東君其四秀木枝枝茂圓荷柄柄香化工園囿密收藏神秀滿池塘礫石流金畏景紈扇飮冰難勝有人身世兩相忘隨處自清凉其五雲散金風徑天開玉宇新亭亭孤月轉冰輪光彩破黃昏清坐翛然韻勝縹眇太虛真境不煩風馭與飈輪平步越崑崙其六弄玉歌清律飛瓊舞散花乾坤一色散銀霞何處是仙家表裏纖塵不立呈似太虛消息晃然高下盡玲瓏神鬼覓無蹤蘇幕遮少追陪稀赴會本分隨緣一任人憎愛勘破前程生死大自究元初晝夜休交昧不粧高不捏怪卓爾身心動止俱無礙贏得逍遙長自在行滿功成定是超三界雲山集卷之六
