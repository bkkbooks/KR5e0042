front:
  text: 雲山集卷之三兄三
  hash: sha256:a2be350bf375865fa373cdc6ade1421bafd1b7b16bee90d8c979d003af30559b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0042_HFL_003-001a, image: hfl/0783/0783-108.png}
body:
  text: 知常真人姬志真撰五言律詩道性明明不是物了了亦非心浩浩通天地冥冥貫古今有無常顯化生滅妄浮沉神鬼莫能測聲聞何處尋禀受骸骨生從地靈明禀自天六門陰鬼伏亘古谷神全性月光輝普心珠照應圓萬緣齊泯滅安穩到重玄祛邪翻身離世網著力斷迷繩不販何樓子誰懸傀儡棚好栽無影樹高點沒油燈滿室盡虛白客邪安敢馮求真白玉石中出黃金礦鍊成寸心離愛欲一性自圓明照破恆沙劫衝開納芥城輪回從此出無滅亦無生委形天倪收委質化物舞强陽擾擾是非海區區名利場百年身頃刻千古夢悠揚向上忽透脫元神歸帝鄉是非是非無正定分量莫能期物理時時别光陰刻刻移蠅頭驅走骨蝸角鬧行尸塗抹謾千古無人解獻疑塵世萬塵深坎窞兩耀急跳丸蠻觸勍蝸世槐檀役蟻官忠誠悲玉璞狡獪泣珠盤幻惑無窮事浮生眼自瞞大身乾坤融大體俯仰一蘧廬萬曜高懸鑒羣生類數輿有無神變化消長氣吹噓未出洪爐外那能遊太虛夜坐枯坐塵心滅忘言道味長不名蝸境界無夢蟻封疆炕暖頻燒葉爐溫旋炷香夜深何限意明月滿虛堂清淡坐穩蒲團力形溫衲褐功拈香酬野客煮茗命山童將送情何懶喧囂耳似聾住山冝淡薄可愛底家風踈懶對客忘拈拂呼童倦擊鐘藥罏餘燼在經卷積塵封不意收雞犬那論媾虎龍般般無伎倆留得一疏慵觀中苔蘚侵新砌松陰亂古壇煮茶燃木葉撥火炷山檀璧月穿茅屋香風動藥欄灑然清況味同志莫盟寒丈室丈室容真境蘧廬映寶臺户扃三界隱簾捲九天開擊玉雲軿集鳴金鶴馭催洞中人不老碧酒鎮相陪世事世事元無限人生自有倪不明樞始用終被物情迷獻笑防遮目臨危悔噬臍未然先薦得扶起上天梯雲遊解放虛舟纜疏開冷鐵枷罄身間日用百衲舊生涯踽踽人間世飄飄象外家虹竿好收拾鈎餌飮雲霞憶山懶慢傲林泉誰論佛與仙揮開韁鎖絆截斷葛藤纏不苟人間世忘懷物外天野雲溪月底逸興浩無邊安間在處要身安無如方寸間窮通時所係生滅命相關妙體陰陽外遺形天地間冥通造物者默轉是非環紙被匪自王家得先承蔡氏頒工夫成甚易受用暖何慳掛壁雲歸岫蒙頭雪在山不求人世重宜伴此身間紫微東墅因寄一十二詠春卜築喜栽培功隨造化開蔬畦臨井側藥圃近墻偎次第榮桃李殷勤闢草萊不知人世事日用信優哉夏笓籬侵野甸莽蒼接虛堂秀木千章合清陰四面凉李繁堆樹熟苽噴滿園香不必拈錢置田家自請嘗秋農家收百穀爽氣自西郊屢掃階前葉重添屋上茅霜陵紅錦樹寒促鬱金苞不見人牛在唯聞牧堅嘲冬重扉簾不捲炕暖紙窗明不問庭前柏忘懷雪裏英燃香凝霧色煮茗作風聲宴坐蒲團穩人間作麼生晝茅屋靜簫條庖丁不用刀山童禁狡獪野客命遊遨路細因人撥畦荒植杖薅都無塵世纍真樂自陶陶夜更闌户不扃被褐谷神凝林際懸金鏡簷牙骨玉繩爐中存活火窗下續清燈久坐形山歇和衣枕曲肱朝昧爽擊金鐘虛堂振祖風隨宜皆妙用或使盡神功寶鼎雲蟠結茅詹氣鬱葱孜孜為利者寧共此時同暮塵塵總破除居居復于于衲褐元相契蒲團舊所須封緘如意藏葆庇夜光珠徑入無何有今吾忘故吾行策杖信心行忘機犬不驚疏籬蟲唧卿高樹鳥嚶嚶物順陰陽變人隨造化營草萊無盡藏蘭蕙可憐生住穩密因時住無緣勝有緣少為塵冗纍不被利名牽昨日同今日來年似去年於羊渾棄意何蟻慕腥羶坐擁褐蒲團坐黃塵不到門黜聰非拱默忘我復吾存祖意何須録玄虛且勿論本然秪這是安穩度朝昏南華熟讀南華旨機關會不難放開無限量收聚一團欒在用光塵雜歸源江海乾銅馳街上立無處問長安清況藜杖撥溪雲芒鞋踏山雪細採活人芝時餐延命屑松梢月正圓竹外風清絶此況不易知莫為名利說莫辨一切俱莫辨得處休矜衒性命緊護持私邪勤煅煉冥冥幻物忘皓皓陽神現來去得自由不憂生死變繼董德卿韻人生貴適意心間身自安草堂新坐具齊鉢舊綿單風掃庭除靜月臨窗户寒沒絃琴掛壁清韻不須彈繼真人天籟韻其一鼓橐靈風振何方不作鳴禺于通衆竅披拂動羣生遺響歸圓寂回機忽變更向尋端的意張口豈容聲其二隱几非今昔神風發太虛有形皆鼓舞何物不吹噓妙體陰陽外聲傳造化初獨吹無孔笛清響徹華胥知常自傳神贊此箇怪形容從來灰槁同寫真真不得著假假何功困憊丹青手常居虛白中百年回首處茅索繫春風長短句曰用要行即行要坐即坐忺時歌困時卧解語無舌人逍遙如此過高閣雲和不用彈免勞更覓松風和性命動若水靜如山坐通關戾默轉樞環有無俱混合聲色莫顢頇性了易命尤難陰陽莫測神鬼何干物物皆從化頭頭不放間習習東風誰是主暗傳春色到人間全真全本無虧真元不妄本全本真一模兩樣開口落名言揚眉成影像主人拂袖便歸來還鄉曲調如何唱玄妙萬緣休處更何言向上機關沒口傳此外别求玄妙理大家總被葛藤纏真空一竅虛空八面玲瓏舒開寶藏敷演靈蹤若非吹掃纖雲力爭得寒光耀太空沖和性天暫復和氣橫流非陰非陽無喜無憂更窮直上難言說高柳迎風笑點頭精神古老精靈馳騁神通縱橫自在變化無窮出入金石踢弄虛空乾坤輕觸百雜碎一喝髑髏三日聾威如虎勢如龍莫交撞入葛藤中無為加一毫即多減一毫即少清靜本然真威嚴無做造法身充滿太虛空却立一塵分徼妙識心識是何人心是何物取之有餘捨之不足頭上更安頭水母蝦為目三徑歸來舊主人剪除藜藿栽松菊見性在耳能聽在口有辭抬手動足瞬目揚眉箇中人知不知由君驅使更何疑若將見處為真實即墮傍門第二機魂魄性是主人形是宅遊即為魂止即魄若將分别論玄機毫末有差天地隔覺照照是誰照覺是誰覺鵠毒一生過模糊兩重錯此處透玄關二邊空索索颯颯西風度晚林一番紅葉瀟瀟落藏天下於天下無道處疾回轉有道處莫留戀虛空分付與虛空天眼龍睛不可見體用水是波波是水有體即用有用即體不即不離非一非二其隱也身入毫芒其顯也光照天地同歸妙本自多歧密轉四時成一歲無人無我體無人用無我不即不離能唱能和非法非非法無可無不可有無三際盡圓通立起一塵看活墮孤峯已往孤峰如瞽如聾未來孤峰水泄不通孤峰見在自西自東普天無不是何處更參同巍巍千丈澄潭側倒蘸無根上下空生死一念起一念滅捨身授身何時是徹改頭换面不自知虛生浪死無休歇心若虛念自絶除根本無枝葉獨露堂堂真箇人萬劫輪回頓超越主賓誰是無主人唤時開眼顧六户放光明四門常擁護主是賓賓是主主人公休暮故月華亭下行枯木堂中住一朝脫却臭皮衫三界十方唯獨步右一十八事答廉先生所問客人扇頭螮蝀臆中蟠龍蛇腕下走達則天下通窮則一身守默然默然緘口緘口好將萬里奮鵬心换作三山釣鼇手七言絶句勉進三首大道無形體若虛肯心於此著工夫雲收月出青霄上一段光明何處無同前靈空如橐靜無懷鼓動來來販骨骸截斷急流生死浪却令灰滅效心齊同前一葉全明造化機毫芒鋒殺巧相宜莫言用盡陽和力來往東風自不知迷家東塗西抹趁華虛何日回程返故廬本是主人甘寄旅早來乘當莫踟蹰忘本蹤跡竛竮倒大癡强分枝派許多疑本源浩蕩傳千古汨沒紅塵自不知夜闌碧落寥寥淡玉繩冷看孤月掛簷楹浮生正逐槐根蟻攪擾華胥夢不成芳春桃李融融次第芳紛紛蜂蝶趁餘香不知游戲真三昧忙亂東風上下狂長春零落桃溪碎曉霞未容消息到山家長春洞裏無根樹不藉東風自放花見妄千形萬狀各分殊病眼看成鬼一車撥盡死灰寒焰在拍天風浪任從渠迹弊已陳芻狗亂如麻幻惑行人病眼花截斷葛藤無事去一軒風月舊生涯贊毁鑽皮出羽間生事洗垢求瘢錯用心勘破主人休歇去遠山秋水自高深知迷向上玄關未易知襄城七聖亦生疑日新何必師童子拜謝歸來更是誰自得透脫希夷向上關亘初靈物坐虛間間中自得真游戲夭閼渾無處處安一氣通融一氣自如如無有相資混太虛撥轉玄關得真息四生咸共入無餘心田剪除荆棘樹芝蘭固蒂靈苗子細看功滿白牛眠露地月明風裊主人間心花大化不能拘束得聯芳唯許自由開一枝亘古新傳授馥郁香風遍九垓心符魔魅勦除無足跡縱橫馳騁大神通提綱振領間呈似萬聖羣真立下風心月掃盡纖塵萬籟沉停停寒色印天心舉頭即見家家在無數空生指上尋心香篤耨旃檀莫與同溫罏活火暖融融劫前一瓣然新炷作麼垂瓜礙不通心琴萬籟消沉夜未央無弦彈出韻琅琅子期不解輿人聽摸索銅盤作太陽心剱雪刃輝輝勢倚天舉之無上直無前豈徒氣焰衝牛斗切碎虛空露帝先心鏡收拾菱花不記年晃然孤月下瑶天虛堂掛起驚神鬼瑩靜光明滿大千心珠如意密封無盡藏夜光輝耀五明宫會逢知友親拈出萬道霞光射碧空心燈洪渺玄虛作短檠非膏非炬放光明乾坤不許絲毫隔山鬼神姦敢放行貴默人皆執我竟驅馳畢竟元無正是非大底衆中常默默自然彼此兩忘機浮生浮生彈指一聲中擾擾膠膠自不通盡被此團藏穢物枉教愁殺主人公自悔蝸角蠅頭著力趍衆中叢裏濫吹竽而今老大方知悔向日云為秪是雛原憲責賜圖跋道到忘言抵死親是貧非病不須貧吉祥端的存虛白肯把真風說與君無情無情不是傲當時收拾精神恐外馳今日放行方得力平生底事老來知元初聰明薦取未言前即是元初妙不傳却向箇中分變態下同幽壤上同天安間是非叢中無語句利名場上不經行人情世態非干己自在安間過一生從分不羡食前方丈玉精粗飽後一般般朝三暮四從吾分嬴得身心到處間平懷懶衣蓬鬢人驚駭錦服金冠自不寧一色平懷無異相不求人重不標行本分不作顛狂不縱心平懷本分道中尋寥天自有家家月莫問浮沉與淺深自觀歷劫輪回心自謾而今收作一團欒光明放出通廖廓不在他觀在自觀無心欣然有樂非真樂樂極哀來為有心莫若無心哀樂盡光明一道古猶今懶惰懶惰偷安未是間前思後算兩相關秪交絶盡絲毫念不動巍巍若泰山仙凡得失循環不可爭平懷本分道中行仙凡一例俱休問記取元初作麼生玄門身在玄門四十年醯雞衝破瓮中天縱橫自在寬如許蝸角蠅頭不直錢物假萬有浮沉水上漚化工不息販何樓癡童撥得間拈弄瓦狗泥車打破休遁化會得山舟密密移有心天地可逃之人中自有藏人處就路歸來更莫疑默契物情著莫寸心灰寒涕慵收口倦開知有不容人會得洞房深鎖白雲堆拂塵修行大抵要修心削盡塵緣萬慮沉露出亘初靈底物不須知覺不須尋空虛修行心地要空虛剎剎塵塵總破除却顯亘初真面目亦無銷减亦無餘形數短長大約百年中擾擾勞生到底空向上好求真箇事密傳薪火用無窮放心心靈漂泊委塵沙似向柴門掃落花措手不能收拾得隨風逐水不還家治心萬緣諸境擾心靈羃羃紅塵鏡面生匠手下功磨拭盡冷光徹底照人明長生長生豈論幻形骸數盡歸元土底埋唯有本真誰會得古今無去亦無來生滅輪回生滅本因心念念遷流古到今磨滅成灰飛不動晃然孤月上瑶岑求己自有天真莫外求幻塵土梗事俱休虛間一片清凉地白璧黃金未足酬間居太平國裏太平人林下山間寄此身霞友相逢無可道百花啼鳥一般春拈舊坐中更作仰天噓唱出陽關會也無影草探竿俱放下大家依樣畫葫蘆塵境滔滔白浪是非海滚滚黃塵名利場無奈戰蝸蠻觸氏不知身世兩微茫形微兩角蝸牛千古事一星石火百年身誰能眼孔車輪大見徹漫天滚滚塵說礙拈枝摘葉漲波瀾浩蕩靈源總不干掛口壁間間坐去大家酩酊到長安脫網世網才疏法網囚檢身羈首自綢繆牢關一拶俱零落杖屨西風笑點頭獨坐百衲雲披杖屨間草堂聊復炷山檀客來問道無言說笑指虛空子細看守愚不學寒猫伏鼠癡窗明炕暖衲重披客來相對如欺魄問著人間總不知坐久雲映青山愜野心草茵盤石老松陰坐中更入無何有不管寥天日欲沉守拙爐中忘却燒鉛汞門外從他長葛藤事事不堪間度日盡交人笑百無能草堂荒蕪三徑絶交遊窗户凄凄冷似秋却得可人真況味略無塵事到心頭驚世貪求深入利名場係縛勞心生愈傷棄重逐輕顛倒用合隄防處不隄防虛生役役身心不自由百年風激水中漚虛生浪死無程限識破歸來便合休安生眨眉欲辨移新舊轉眼那知换古今現在未來俱不識問誰誰許問安心著物浮名浮利意何深用盡機關使破心但為兒孫千載計不防骸骨土相侵逐境目前滚滚蕩黃塵大化推移刻刻新生死窟中人不覺捨身唯與利名親名利僕馬車舟歷險艱區區名利兩相關細思本欲圖安穩却使身心不暫間客至或聞車從叩柴荆百衲旋披勉强迎自料無錢置村釀一甌春雪淡交情靜度洞房無鎖未嘗扃碧落寥寥月滿庭千古雲和絃不續夜寒流水響泠泠蛻塵蛻塵蛻法蛻諸緣不說丹成上九天妄自不存真不立更無言說到重玄不知千差萬異莫能齊跳出拘虛到不知却向箇中分變態堆山積嶽總無為機密茅靡波流未出宗巫咸自失想無功長於上古先天地大振玄風處處同復全壽焰傳來不記年久湛人僞染諸緣諸緣削盡忘人僞亘古天真依舊全居山自與雲山舊結緣煙霞占斷不拈錢溪邊石上間遊戲不問人間不學仙南華九天天和無喜亦無憂石女明知笑點頭酬酢萬方間日用本然之外更何求其二天籟形聲不可模羣生萬有自禺于一風總攝俱圓寂物盡人空見也無其三天門開闔莫能知正坐全無一念時萬有萬塵從此出落花飛絮自離披其四天光宇泰自分明射透閭浮破鐵城遍界疏通無擁塞山河大地坦然平其五天機消息有無間斡運乾坤萬象間撥動亘初關戾子一時春色滿人寰其六天遊蒿目莫能窺捨故趍新刻刻移握掌開拳還過去活機無不墮今時其七天府無容無不容一毫包盡太虛空打開封鎖交君見笑倒厖眉祖老翁其八天倪本分具神通一體洪纖用不同試向東風問無語柳稍青淺小桃紅其九天鈞無我亦無人萬有浮沉局局新殘臘盡時回暖律野花芳草一般春雲山集卷之三
